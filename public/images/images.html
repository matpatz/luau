<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Upload Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
    padding:20px;
}
.container { max-width:900px; margin:auto; }
input, button, select {
    padding:8px; margin:6px 0; width:100%;
    background:#222; color:white; border:1px solid #444;
}
.gallery-item {
    background:#1a1a1a;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
}
.thumb {
    max-width:180px; display:block; margin-bottom:10px;
}
button { cursor:pointer; }
.row { display:flex; gap:10px; }
.half { flex:1; }
</style>
</head>

<body>

<div class="container">

<h2>Email Verification</h2>
<input id="email" placeholder="Email">
<button onclick="sendCode()">Send Code</button>
<input id="verifyCode" placeholder="Enter Code">
<button onclick="verifyEmail()">Verify Email</button>
<div id="verifyStatus"></div>

<hr>

<h2>Upload Media</h2>
<input id="service" placeholder="Service tag (example: discord)">
<input id="keywords" placeholder="Keywords">
<select id="publicToggle">
    <option value="true">Public</option>
    <option value="false">Private</option>
</select>
<input id="mediaFile" type="file" accept="image/*,video/mp4,video/webm">
<button onclick="uploadMedia()">Upload</button>

<hr>

<h2>Search</h2>
<input id="searchKeywords" placeholder="Keywords search">
<input id="searchService" placeholder="Service filter">
<select id="searchPublic">
    <option value="">All</option>
    <option value="true">Public Only</option>
    <option value="false">Private Only</option>
</select>
<button onclick="loadGallery()">Search</button>

<hr>

<h2>Gallery</h2>
<div id="gallery"></div>

</div>

<script>

// --- YOUR SUPABASE CREDS (unchanged exactly as you wrote them) ---
const supabaseUrl = 'https://erctbeaqvqxjsrdjzonw.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyY3RiZWFxdnF4anNyZGp6b253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MzE2OTgsImV4cCI6MjA4MDIwNzY5OH0.Yal4o1NDY7p5W822mX7kaigTpPakTyygKLlp67ic6Kg';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// ---------------------- EMAIL VERIFICATION ----------------------

async function sendCode() {
    const email = document.getElementById("email").value;
    if (!email) return alert("Enter email");

    const code = Math.floor(100000 + Math.random() * 900000).toString();

    await supabase
        .from("user_verification")
        .upsert({ email: email, code: code, verified: false });

    alert("Code: " + code + " (simulate email)");
}

async function verifyEmail() {
    const email = document.getElementById("email").value;
    const code = document.getElementById("verifyCode").value;

    const { data } = await supabase
        .from("user_verification")
        .select("*")
        .eq("email", email)
        .single();

    if (!data) return alert("Email not found");
    if (data.code !== code) return alert("Invalid code");

    await supabase
        .from("user_verification")
        .update({ verified: true, can_upload_videos: true })
        .eq("email", email);

    document.getElementById("verifyStatus").innerText = "Verified. Video upload unlocked.";
}

// ---------------------- UPLOAD MEDIA ----------------------

async function uploadMedia() {
    const file = document.getElementById("mediaFile").files[0];
    if (!file) return alert("No file");

    const email = document.getElementById("email").value;
    const { data: user } = await supabase
        .from("user_verification")
        .select("*")
        .eq("email", email)
        .single();

    const isVideo = file.type.startsWith("video");

    if (isVideo && (!user || !user.can_upload_videos)) {
        return alert("Verify email to upload videos.");
    }

    const path = Date.now() + "_" + file.name;

    // upload to bucket
    await supabase.storage
        .from("media")
        .upload(path, file, { upsert: false });

    const { data: pub } = supabase.storage
        .from("media")
        .getPublicUrl(path);

    const publicUrl = pub.publicUrl;

    // insert record
    await supabase.from("profile_pictures").insert({
        url: publicUrl,
        service: document.getElementById("service").value,
        keywords: document.getElementById("keywords").value,
        public: document.getElementById("publicToggle").value === "true",
        type: isVideo ? "video" : "image"
    });

    alert("Uploaded");
    loadGallery();
}

// ---------------------- LOAD GALLERY ----------------------

async function loadGallery() {
    const kw = document.getElementById("searchKeywords").value;
    const service = document.getElementById("searchService").value;
    const pub = document.getElementById("searchPublic").value;

    let query = supabase.from("profile_pictures").select("*").order("id", { ascending: false });

    if (kw) query = query.ilike("keywords", "%" + kw + "%");
    if (service) query = query.eq("service", service);
    if (pub !== "") query = query.eq("public", pub === "true");

    const { data } = await query;
    const g = document.getElementById("gallery");
    g.innerHTML = "";

    data.forEach(item => {
        const div = document.createElement("div");
        div.className = "gallery-item";

        let mediaTag = "";
        if (item.type === "video") {
            mediaTag = `<video class="thumb" src="${item.url}" controls></video>`;
        } else {
            mediaTag = `<img class="thumb" src="${item.url}">`;
        }

        div.innerHTML = `
            ${mediaTag}
            <div>Service: ${item.service}</div>
            <div>Keywords: ${item.keywords}</div>
            <div>Rating: ${item.rating}</div>
            <div>Views: ${item.views}</div>

            <button onclick="share('${item.url}')">Share</button>
            <button onclick="rate(${item.id}, ${item.rating + 1})">+ Rating</button>
            <button onclick="addView(${item.id}, ${item.views})">+ View</button>
        `;
        g.appendChild(div);
    });
}

// ---------------------- SHARE ----------------------

function share(url) {
    navigator.clipboard.writeText(url);
    alert("Copied URL");
}

// ---------------------- RATE ----------------------

async function rate(id, newVal) {
    await supabase
        .from("profile_pictures")
        .update({ rating: newVal })
        .eq("id", id);
    loadGallery();
}

// ---------------------- VIEWS ----------------------

async function addView(id, current) {
    await supabase
        .from("profile_pictures")
        .update({ views: current + 1 })
        .eq("id", id);
    loadGallery();
}

loadGallery();

</script>

</body>
</html>
