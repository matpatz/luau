<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catastrophia Dashboard</title>
<style>
/* Reset & base styles */
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; padding: 20px; }

/* Container & headings */
h2 { text-align: center; margin-bottom: 20px; color: #00f6ff; text-shadow: 0 0 10px rgba(0,246,255,0.5); }
.container { max-width: 900px; margin: 0 auto; background: rgba(20,20,40,0.85); border-radius: 12px; padding: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.6); border:1px solid #444; }

/* Player list */
#playerList { max-height: 250px; overflow-y: auto; border-radius: 8px; background: rgba(40,40,80,0.6); padding: 8px; margin-bottom: 15px; }
.player-item { padding: 10px; border-bottom: 1px solid #555; cursor: pointer; display: flex; justify-content: space-between; border-radius: 6px; transition: all 0.2s; }
.player-item:hover { background: rgba(70,70,140,0.6); }
.player-info { display: flex; flex-direction: column; }
.player-name { font-weight: 600; }
.player-id { font-size: 0.85em; color: #ccc; }
.player-killcode { color: #00f6ff; font-weight: bold; }

/* Inputs & buttons */
input[type="text"] { width: calc(100% - 110px); padding: 10px; border-radius: 6px; border: 2px solid #555; background: rgba(35,35,65,0.8); color: #fff; font-size: 16px; transition: 0.3s; }
input[type="text"]:focus { outline: none; border-color: #00f6ff; box-shadow: 0 0 10px rgba(0,246,255,0.5); }
button { padding: 10px 20px; border-radius: 6px; border: none; background: linear-gradient(135deg,#00c6ff,#0072ff); color: #fff; font-weight: bold; cursor: pointer; transition: all 0.3s; margin-left: 6px; }
button:hover { background: linear-gradient(135deg,#00eeff,#008cff); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,238,255,0.4); }

/* Command log */
#commandLog { height: 250px; overflow-y: auto; border-radius: 8px; background: rgba(30,30,60,0.85); padding: 10px; border:1px solid #555; margin-top: 15px; }
.log-entry { margin-bottom: 6px; padding: 6px 10px; border-radius: 6px; background: rgba(40,40,80,0.5); border-left: 3px solid #00f6ff; }
.timestamp { color: #00f6ff; margin-right: 6px; }
.system-msg { color: #00f6ff; }
.error-msg { color: #ff5555; }
.success-msg { color: #55ff55; }
.command-msg { color: #ffcc00; }
.server-msg { color: #ff88cc; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: rgba(30,30,60,0.8); border-radius: 5px; }
::-webkit-scrollbar-thumb { background: linear-gradient(135deg,#00c6ff,#0072ff); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg,#00eeff,#008cff); }

/* Layout tweaks */
.input-group { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="container">
  <h2>Catastrophia Dashboard</h2>

  <div class="input-group">
    <input type="text" id="killcodeInput" placeholder="Enter Killcode">
    <button id="selectPlayer">Select Player</button>
  </div>

  <div id="playerList"><div class="player-item">Loading players...</div></div>

  <div class="input-group">
    <input type="text" id="luaInput" placeholder="Enter Lua code here">
    <button id="sendLuaBtn">Send Lua</button>
  </div>

  <div id="commandLog"><div class="log-entry"><span class="timestamp">[System]</span><span class="system-msg">Dashboard initialized</span></div></div>
</div>

<script>
const killcodeInput = document.getElementById('killcodeInput');
const selectPlayerBtn = document.getElementById('selectPlayer');
const luaInput = document.getElementById('luaInput');
const sendLuaBtn = document.getElementById('sendLuaBtn');
const commandLog = document.getElementById('commandLog');
const playerList = document.getElementById('playerList');
let selectedPlayer = null;

const API_URL = "https://website-iota-ivory-12.vercel.app/api/send";

function addLogEntry(msg, type='system'){
  const ts = new Date().toLocaleTimeString();
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  let prefix='[System]', cls='system-msg';
  if(type==='error'){ prefix='[Error]'; cls='error-msg'; }
  else if(type==='success'){ prefix='[Success]'; cls='success-msg'; }
  else if(type==='command'){ prefix='[Command]'; cls='command-msg'; }
  else if(type==='server'){ prefix='[Server]'; cls='server-msg'; }
  entry.innerHTML = `<span class="timestamp">[${ts}] ${prefix}</span> <span class="${cls}">${msg}</span>`;
  commandLog.appendChild(entry);
  commandLog.scrollTop = commandLog.scrollHeight;
}

async function updatePlayerList(){
  playerList.innerHTML = '<div class="player-item">Loading...</div>';
  try {
    const res = await fetch(API_URL);
    const players = await res.json();
    playerList.innerHTML = '';
    if(players.length === 0){
      playerList.innerHTML = '<div class="player-item">No players connected</div>';
      return;
    }
    players.forEach(player => {
      const item = document.createElement('div');
      item.className = 'player-item';
      item.innerHTML = `<div class="player-info"><span class="player-name">${player.player}</span><span class="player-id">ID: ${player.userid}</span></div><span class="player-killcode">${player.killcode}</span>`;
      item.addEventListener('click', () => {
        selectedPlayer = player;
        killcodeInput.value = player.killcode;
        addLogEntry(`Selected player: ${player.player} (${player.killcode})`, 'success');
      });
      playerList.appendChild(item);
    });
  } catch(e){
    playerList.innerHTML = '<div class="player-item">Error loading players</div>';
    addLogEntry('Failed to fetch players: ' + e.message, 'error');
  }
}

async function sendLuaToPlayer(killcode, code){
  try {
    const res = await fetch(API_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ killcode, type:"lua", value: code })
    });
    if(res.ok){ addLogEntry(`Sent Lua to ${killcode}: ${code}`, 'command'); } 
    else { addLogEntry(`Failed to send Lua (${res.status})`, 'error'); }
  } catch(e){ addLogEntry(`Error sending Lua: ${e.message}`, 'error'); }
}

selectPlayerBtn.addEventListener('click', ()=>{
  const k = killcodeInput.value.trim();
  if(k) addLogEntry(`Selected killcode manually: ${k}`, 'system');
  else addLogEntry('Please enter a killcode', 'error');
});

sendLuaBtn.addEventListener('click', ()=>{
  const code = luaInput.value.trim();
  if(!selectedPlayer){ addLogEntry('No player selected', 'error'); return; }
  if(!code){ addLogEntry('No Lua code entered', 'error'); return; }
  sendLuaToPlayer(selectedPlayer.killcode, code);
  luaInput.value='';
});

updatePlayerList();
setInterval(updatePlayerList, 5000);
addLogEntry('Dashboard ready. Waiting for player connections...', 'system');
</script>
</body>
</html>
