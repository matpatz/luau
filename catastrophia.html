<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Command Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(25, 25, 48, 0.8);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #39396b;
        }
        
        .title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
            color: #00eeff;
            text-shadow: 0 0 10px rgba(0, 238, 255, 0.5);
            padding: 10px;
            border-bottom: 2px solid #39396b;
        }
        
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .input-field {
            flex: 1;
            padding: 12px 15px;
            border-radius: 6px;
            border: 2px solid #39396b;
            background: rgba(30, 30, 60, 0.8);
            color: #fff;
            font-size: 16px;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #00eeff;
            box-shadow: 0 0 10px rgba(0, 238, 255, 0.5);
        }
        
        .enter-btn {
            padding: 12px 25px;
            border-radius: 6px;
            border: none;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .enter-btn:hover {
            background: linear-gradient(135deg, #00eeff, #008cff);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 238, 255, 0.4);
        }
        
        .commands-title {
            font-size: 22px;
            margin-bottom: 15px;
            color: #00eeff;
            text-align: center;
        }
        
        .commands-container {
            background: rgba(30, 30, 60, 0.8);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            border: 2px solid #39396b;
            height: 150px;
        }
        
        .commands-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 5px;
        }
        
        .command-label {
            padding: 12px 20px;
            background: linear-gradient(135deg, #2b2b5e, #3d3d89);
            border-radius: 6px;
            min-width: 120px;
            text-align: center;
            border: 1px solid #5454a3;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        .log-container {
            background: rgba(30, 30, 60, 0.8);
            border-radius: 8px;
            padding: 15px;
            border: 2px solid #39396b;
            height: 250px;
            overflow-y: auto;
        }
        
        .log-title {
            font-size: 22px;
            margin-bottom: 15px;
            color: #00eeff;
            text-align: center;
        }
        
        .log-content {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .log-entry {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 4px;
            background: rgba(40, 40, 80, 0.5);
            border-left: 3px solid #00eeff;
        }
        
        .timestamp {
            color: #00eeff;
            margin-right: 8px;
        }
        
        .system-msg {
            color: #00eeff;
        }
        
        .error-msg {
            color: #ff5555;
        }
        
        .success-msg {
            color: #55ff55;
        }
        
        .command-msg {
            color: #ffcc00;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(30, 30, 60, 0.8);
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #00eeff, #008cff);
        }
        
        @media (max-width: 600px) {
            .input-section {
                flex-direction: column;
            }
            
            .title {
                font-size: 24px;
            }
            
            .command-label {
                min-width: 100px;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Commandz</h1>
        
        <div class="input-section">
            <input type="text" class="input-field" id="commandInput" placeholder="Enter killcode / command">
            <button class="enter-btn" id="enterButton">Enter</button>
        </div>
        
        <h2 class="commands-title">Available Commands</h2>
        <div class="commands-container">
            <div class="commands-scroll">
                <div class="command-label">reset</div>
                <div class="command-label">lag</div>
                <div class="command-label">dbackpack</div>
                <div class="command-label">leave</div>
                <div class="command-label">crash</div>
                <div class="command-label">console</div>
                <div class="command-label">rconsole</div>
                <div class="command-label">cban</div>
                <div class="command-label">rban</div>
            </div>
        </div>
        
        <h2 class="log-title">Command Log</h2>
        <div class="log-container">
            <div class="log-content" id="commandLog">
                <div class="log-entry">
                    <span class="timestamp">[System]</span>
                    <span class="system-msg">Enter a killcode to begin</span>
                </div>
                <div class="log-entry">
                    <span class="timestamp">[Info]</span>
                    <span class="system-msg">Your killcode: <span id="userKillcode"></span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const commandInput = document.getElementById('commandInput');
            const enterButton = document.getElementById('enterButton');
            const commandLog = document.getElementById('commandLog');
            const userKillcode = document.getElementById('userKillcode');
            
            // Simulate getting the user's killcode (as in the Lua code)
            const userId = Math.floor(Math.random() * 10000000) + 1; // Simulated user ID
            const ks = Math.round((userId / 1000000) + 1);
            userKillcode.textContent = ks;
            
            let commandMode = false;
            let lagging = false;
            
            // Add a log entry to the command log
            function addLogEntry(message, type = 'system') {
                const timestamp = new Date().toLocaleTimeString();
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                
                let prefix = '[System]';
                let msgClass = 'system-msg';
                
                if (type === 'error') {
                    prefix = '[Error]';
                    msgClass = 'error-msg';
                } else if (type === 'success') {
                    prefix = '[Success]';
                    msgClass = 'success-msg';
                } else if (type === 'command') {
                    prefix = '[Command]';
                    msgClass = 'command-msg';
                }
                
                entry.innerHTML = `<span class="timestamp">${prefix}</span> <span class="${msgClass}">${message}</span>`;
                commandLog.appendChild(entry);
                
                // Scroll to bottom
                commandLog.scrollTop = commandLog.scrollHeight;
            }
            
            // Handle commands based on input
            function handleCommand(command) {
                command = command.toLowerCase();
                
                if (!commandMode) {
                    if (command === ks.toString()) {
                        commandMode = true;
                        addLogEntry('Killcode accepted. Command mode activated.', 'success');
                        commandInput.placeholder = "Enter command";
                    } else {
                        addLogEntry('Invalid killcode. Try again.', 'error');
                    }
                    return;
                }
                
                // Process commands
                switch(command) {
                    case 'reset':
                        addLogEntry('Executing reset command...', 'command');
                        setTimeout(() => addLogEntry('Character reset successfully.', 'success'), 800);
                        break;
                        
                    case 'lag':
                        lagging = !lagging;
                        if (lagging) {
                            addLogEntry('Lag mode activated. Network disruption initiated.', 'command');
                        } else {
                            addLogEntry('Lag mode deactivated. Network restored.', 'command');
                        }
                        break;
                        
                    case 'deletebackpack':
                        addLogEntry('Executing deletebackpack command...', 'command');
                        setTimeout(() => addLogEntry('Backpack items deleted successfully.', 'success'), 800);
                        break;
                        
                    case 'leave':
                        addLogEntry('Executing leave command...', 'command');
                        setTimeout(() => {
                            addLogEntry('You have been kicked from the game.', 'error');
                            addLogEntry('Connection lost. Please reconnect.', 'error');
                        }, 1000);
                        break;
                        
                    case 'crash':
                        addLogEntry('Executing crash command...', 'command');
                        setTimeout(() => {
                            addLogEntry('System instability detected...', 'error');
                            addLogEntry('CRITICAL ERROR: Game crash initiated', 'error');
                        }, 1000);
                        break;
                        
                    case 'console':
                        addLogEntry('Console access requested...', 'command');
                        setTimeout(() => addLogEntry('Console activated. Developer mode enabled.', 'success'), 800);
                        break;
                        
                    case 'rconsole':
                        addLogEntry('Remote console access requested...', 'command');
                        setTimeout(() => addLogEntry('RConsole opened! Remote access established.', 'success'), 800);
                        break;
                        
                    case 'cban':
                        addLogEntry('Executing client ban command...', 'command');
                        setTimeout(() => addLogEntry('Client ban applied successfully. User restricted.', 'success'), 800);
                        break;
                        
                    case 'rban':
                        addLogEntry('Executing remote ban command...', 'command');
                        setTimeout(() => addLogEntry('Remote ban applied successfully. User banned across servers.', 'success'), 800);
                        break;
                        
                    default:
                        addLogEntry(`Unknown command: ${command}`, 'error');
                        addLogEntry('Type one of the available commands from the list.', 'system');
                }
            }
            
            // Event listener for the Enter button
            enterButton.addEventListener('click', function() {
                const command = commandInput.value.trim();
                if (command) {
                    handleCommand(command);
                    commandInput.value = '';
                }
            });
            
            // Also allow pressing Enter in the input field
            commandInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const command = commandInput.value.trim();
                    if (command) {
                        handleCommand(command);
                        commandInput.value = '';
                    }
                }
            });
            
            // Add some initial log entries
            setTimeout(() => {
                addLogEntry('System initialized. Waiting for input.', 'system');
            }, 500);
        });
    </script>
</body>
</html>
