<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile Pictures</title>
<style>
    body {
        margin: 0;
        background: #0f0f0f;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    header {
        width: 100%;
        padding: 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        background: #111;
        position: sticky;
        top: 0;
        z-index: 10;
    }

    #search {
        padding: 6px 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
        width: 160px;
    }

    button {
        padding: 7px 14px;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
    }

    button:hover {
        background: #333;
    }

    #imageGrid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
        padding: 20px;
        max-width: 100vw;
        overflow-x: hidden;
        box-sizing: border-box;
    }

    .imgBox {
        background: #1b1b1b;
        padding: 12px;
        border-radius: 14px;
        width: 220px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .imgBox img {
        width: 100%;
        border-radius: 12px;
    }

    .rating {
        display: flex;
        gap: 6px;
        align-self: flex-end;
    }

    .rating span {
        cursor: pointer;
        font-size: 20px;
    }

    .downloadBtn {
        width: 100%;
        padding: 6px 0;
        text-align: center;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
    }

    #categoryInput {
        padding: 6px 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
        display: none;
        margin-left: 10px;
    }
</style>
</head>

<body>
<header>
    <input id="search" placeholder="Search..." />
    <button id="formatBtn">Format Image</button>
    <button id="requestUploadBtn">Request Upload</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none;" />
    <input type="text" id="categoryInput" placeholder="Category" />
</header>

<div id="imageGrid"></div>

<script>
let pendingUploads = [];
let publicImages = [];
let formatImageTemp = null;

// Load saved public images (max 1000) from localStorage
window.onload = () => {
    const saved = localStorage.getItem("publicImages");
    if (saved) publicImages = JSON.parse(saved).slice(0,1000);
    renderImages();
};

// Search filter
const searchBox = document.getElementById('search');
searchBox.addEventListener('input', renderImages);

const fileInput = document.getElementById('fileInput');
const formatBtn = document.getElementById('formatBtn');
const requestUploadBtn = document.getElementById('requestUploadBtn');
const categoryInput = document.getElementById('categoryInput');

// Load image for formatting or upload
formatBtn.onclick = () => fileInput.click();
requestUploadBtn.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
        formatImageTemp = reader.result;
        categoryInput.style.display = 'inline-block';
        alert("Image loaded. Enter category and choose action.");
    };
    reader.readAsDataURL(file);
};

// Format image (does not upload)
formatBtn.addEventListener('click', () => {
    if (!formatImageTemp) return alert("Upload an image first.");
    const img = new Image();
    img.src = formatImageTemp;
    img.onload = () => {
        const canvas = document.createElement('canvas');
        const size = Math.min(img.width, img.height);
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 512, 512);
        const a = document.createElement('a');
        a.href = canvas.toDataURL("image/png");
        a.download = "formatted_discord_pfp.png";
        a.click();
    };
});

// Request upload (requires category)
requestUploadBtn.addEventListener('click', () => {
    if (!formatImageTemp) return alert("Upload an image first.");
    if (!categoryInput.value) return alert("Enter a category before requesting upload.");
    pendingUploads.push({ src: formatImageTemp, rating: 0, category: categoryInput.value });
    alert("Upload request submitted. Pending human verification.");
    formatImageTemp = null;
    categoryInput.value = '';
    categoryInput.style.display = 'none';
    renderImages();
});

// Render images
function renderImages() {
    const grid = document.getElementById('imageGrid');
    grid.innerHTML = '';
    const query = searchBox.value.toLowerCase();
    const allImages = [...publicImages, ...pendingUploads];

    allImages.filter(img => img.category?.toLowerCase().includes(query)).forEach((img) => {
        const box = document.createElement('div');
        box.className = 'imgBox';

        const image = document.createElement('img');
        image.src = img.src;

        const rating = document.createElement('div');
        rating.className = 'rating';
        for (let i = 1; i <= 5; i++) {
            const star = document.createElement('span');
            star.textContent = i <= img.rating ? '★' : '☆';
            star.onclick = () => {
                img.rating = i;
                localStorage.setItem("publicImages", JSON.stringify(publicImages));
                renderImages();
            };
            rating.appendChild(star);
        }

        const dl = document.createElement('button');
        dl.className = 'downloadBtn';
        dl.textContent = "Download";
        dl.onclick = () => {
            const a = document.createElement('a');
            a.href = img.src;
            a.download = "profile.png";
            a.click();
        };

        box.appendChild(image);
        box.appendChild(rating);
        box.appendChild(dl);
        grid.appendChild(box);
    });
}
</script>
</body>
</html>
