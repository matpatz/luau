<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile Pictures</title>
<!-- Add Supabase client library -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
    body {
        margin: 0;
        background: #0f0f0f;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    header {
        width: 100%;
        padding: 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 15px;
        background: #111;
        position: sticky;
        top: 0;
        z-index: 10;
        padding-right: 60px; /* Moved left */
    }

    #search {
        padding: 6px 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
        width: 160px;
    }

    button {
        padding: 7px 14px;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
    }

    button:hover {
        background: #333;
    }

    #imageGrid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
        padding: 20px;
        max-width: 100vw;
        overflow-x: hidden;
        box-sizing: border-box;
    }

    .imgBox {
        background: #1b1b1b;
        padding: 12px;
        border-radius: 14px;
        width: 220px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .imgBox img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 12px;
    }

    .rating {
        display: flex;
        gap: 6px;
        align-self: flex-end;
    }

    .rating span {
        cursor: pointer;
        font-size: 20px;
    }

    .downloadBtn {
        width: 100%;
        padding: 6px 0;
        text-align: center;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
    }

    #verifyBoxContainer {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1a1a1a;
        padding: 20px;
        border-radius: 12px;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 20;
        border: 1px solid #333;
    }

    #verifyBoxContainer img {
        max-width: 400px;
        max-height: 400px;
        border-radius: 12px;
        border: 1px solid #444;
    }

    #verifyActions {
        display: flex;
        gap: 10px;
        align-items: center;
        width: 100%;
        justify-content: flex-start;
    }

    #verifyActions input, #verifyActions select, #verifyActions button {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #222;
        color: #fff;
        cursor: pointer;
    }

    #verifyActions input {
        width: 120px;
    }

    .pending-badge {
        background: #ff9800;
        color: #000;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        margin-top: 5px;
    }

    .verified-badge {
        background: #4CAF50;
        color: #000;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        margin-top: 5px;
    }

    .close-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #ff4444;
        border: none;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        cursor: pointer;
        color: white;
        font-weight: bold;
    }
</style>
</head>

<body>
<header>
    <input id="search" placeholder="Search..." />
    <button id="formatBtn">Format Image</button>
    <button id="uploadBtn">Request Upload</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none;" />
</header>

<div id="verifyBoxContainer">
    <button class="close-btn" id="closeVerifyBtn">×</button>
    <img id="verifyImg" src="" />
    <div id="verifyActions">
        <input type="text" id="keywordsInput" placeholder="Keywords" />
        <select id="serviceSelect">
            <option value="">Select Service</option>
            <option value="Discord">Discord</option>
            <option value="YouTube">YouTube</option>
            <option value="TikTok">TikTok</option>
            <option value="Other">Other</option>
        </select>
        <button id="submitVerifyBtn">Submit for Review</button>
    </div>
</div>

<div id="imageGrid"></div>

<script>
// Initialize Supabase client
const supabaseUrl = 'https://erctbeaqvqxjsrdjzonw.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyY3RiZWFxdnF4anNyZGp6b253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MzE2OTgsImV4cCI6MjA4MDIwNzY5OH0.Yal4o1NDY7p5W822mX7kaigTpPakTyygKLlp67ic6Kg';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let pendingUploads = [];
let verifiedImages = [];
let tempImage = null;

// Check if Supabase connection works
async function testSupabase() {
    try {
        console.log("Testing Supabase connection...");
        const { data, error } = await supabase.from('profile_pictures').select('count');
        if (error) {
            console.error("Supabase connection error:", error);
            return false;
        }
        console.log("Supabase connection successful");
        return true;
    } catch (err) {
        console.error("Supabase test failed:", err);
        return false;
    }
}

window.onload = async () => {
    console.log("Page loading...");
    const connected = await testSupabase();
    if (!connected) {
        console.warn("Supabase not connected, using local storage only");
        // Load from local storage as fallback
        const saved = localStorage.getItem("verifiedImages");
        if (saved) verifiedImages = JSON.parse(saved);
    } else {
        await loadImagesFromSupabase();
    }
    renderImages();
};

// Function to load images from Supabase
async function loadImagesFromSupabase() {
    try {
        console.log("Loading images from Supabase...");
        const { data, error } = await supabase
            .from('profile_pictures')
            .select('*')
            .eq('verified', true)
            .order('created_at', { ascending: false });

        if (error) {
            console.error("Error loading from Supabase:", error);
            throw error;
        }

        console.log("Loaded", data.length, "images from Supabase");
        verifiedImages = data.map(item => ({
            id: item.id,
            src: item.url,
            service: item.service,
            keywords: item.keywords,
            rating: item.rating || 0,
            verified: true
        }));

        // Save to local storage as backup
        localStorage.setItem("verifiedImages", JSON.stringify(verifiedImages));

    } catch (error) {
        console.error('Error loading images:', error);
        // Fallback to local storage
        const saved = localStorage.getItem("verifiedImages");
        if (saved) verifiedImages = JSON.parse(saved);
    }
}

// Function to save image to Supabase (as Base64 for now)
async function saveImageToSupabase(imageData) {
    try {
        console.log("Saving image to Supabase...");
        
        // For now, save as Base64 directly
        const { data, error } = await supabase
            .from('profile_pictures')
            .insert([
                {
                    url: imageData.src, // This is Base64
                    service: imageData.service,
                    keywords: imageData.keywords,
                    rating: 0,
                    verified: false,
                    created_at: new Date().toISOString()
                }
            ])
            .select();

        if (error) {
            console.error("Supabase insert error:", error);
            throw error;
        }
        
        console.log('Image saved to Supabase:', data[0].id);
        return data[0].id;

    } catch (error) {
        console.error('Error saving image:', error);
        // Fallback: save to local storage
        const id = 'local_' + Date.now();
        pendingUploads.push({
            id: id,
            src: imageData.src,
            rating: 0,
            service: imageData.service,
            keywords: imageData.keywords,
            verified: false,
            local: true
        });
        return id;
    }
}

// Function to update rating in Supabase
async function updateRatingInSupabase(imageId, rating) {
    try {
        // Skip if it's a local image
        if (imageId.startsWith('local_')) return;
        
        const { error } = await supabase
            .from('profile_pictures')
            .update({ rating: rating })
            .eq('id', imageId);

        if (error) throw error;
        
    } catch (error) {
        console.error('Error updating rating:', error);
    }
}

const searchBox = document.getElementById('search');
searchBox.addEventListener('input', renderImages);

const fileInput = document.getElementById('fileInput');
const formatBtn = document.getElementById('formatBtn');
const uploadBtn = document.getElementById('uploadBtn');
const verifyBoxContainer = document.getElementById('verifyBoxContainer');
const verifyImg = document.getElementById('verifyImg');
const keywordsInput = document.getElementById('keywordsInput');
const serviceSelect = document.getElementById('serviceSelect');
const submitVerifyBtn = document.getElementById('submitVerifyBtn');
const closeVerifyBtn = document.getElementById('closeVerifyBtn');

uploadBtn.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    // Check file size (limit to 2MB for Base64)
    if (file.size > 2 * 1024 * 1024) {
        alert("File size too large. Please upload images under 2MB.");
        return;
    }
    
    const reader = new FileReader();
    reader.onload = () => {
        tempImage = reader.result;
        verifyImg.src = tempImage;
        verifyBoxContainer.style.display = 'flex';
    };
    reader.readAsDataURL(file);
};

closeVerifyBtn.onclick = () => {
    verifyBoxContainer.style.display = 'none';
    tempImage = null;
    keywordsInput.value = '';
    serviceSelect.value = '';
    fileInput.value = '';
};

submitVerifyBtn.onclick = async () => {
    if (!tempImage) {
        alert("No image to submit.");
        return;
    }
    
    if (!serviceSelect.value) {
        alert("Please select a service.");
        return;
    }
    
    const keywords = keywordsInput.value.trim();
    if (!keywords) {
        alert("Please enter keywords.");
        return;
    }

    // Show loading state
    const originalText = submitVerifyBtn.textContent;
    submitVerifyBtn.textContent = 'Uploading...';
    submitVerifyBtn.disabled = true;

    try {
        const imageData = {
            src: tempImage,
            service: serviceSelect.value,
            keywords: keywords
        };

        const imageId = await saveImageToSupabase(imageData);
        
        if (imageId) {
            alert("✅ Upload submitted! The image will appear in the gallery.");
        }
        
    } catch (error) {
        console.error('Upload error:', error);
        alert("⚠️ Upload saved locally. May not sync to server.");
    } finally {
        // Reset UI
        verifyBoxContainer.style.display = 'none';
        tempImage = null;
        keywordsInput.value = '';
        serviceSelect.value = '';
        fileInput.value = '';
        
        submitVerifyBtn.textContent = originalText;
        submitVerifyBtn.disabled = false;
        
        // Refresh display
        renderImages();
    }
};

function renderImages() {
    const grid = document.getElementById('imageGrid');
    grid.innerHTML = '';
    const query = searchBox.value.toLowerCase();
    
    // Combine verified and pending images
    const allImages = [...verifiedImages, ...pendingUploads];
    
    // Filter images based on search query
    const filteredImages = allImages.filter(img => {
        if (!img) return false;
        const serviceMatch = img.service && img.service.toLowerCase().includes(query);
        const keywordMatch = img.keywords && img.keywords.toLowerCase().includes(query);
        return serviceMatch || keywordMatch;
    });
    
    if (filteredImages.length === 0) {
        const message = document.createElement('div');
        message.style.textAlign = 'center';
        message.style.width = '100%';
        message.style.padding = '40px';
        message.style.color = '#666';
        message.textContent = query ? 'No images found for your search.' : 'No images yet. Upload one!';
        grid.appendChild(message);
        return;
    }
    
    // Display filtered images
    filteredImages.forEach(img => {
        const box = document.createElement('div');
        box.className = 'imgBox';

        const image = document.createElement('img');
        image.src = img.src;
        image.alt = `${img.service || 'Unknown'} profile picture`;
        image.onerror = function() {
            this.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="220" height="200" viewBox="0 0 220 200"><rect width="100%" height="100%" fill="%231a1a1a"/><text x="50%" y="50%" fill="%23666" font-family="Arial" font-size="14" text-anchor="middle" dy=".3em">Image</text></svg>';
        };

        const rating = document.createElement('div');
        rating.className = 'rating';
        for (let i = 1; i <= 5; i++) {
            const star = document.createElement('span');
            star.textContent = i <= img.rating ? '★' : '☆';
            star.style.color = i <= img.rating ? '#ffd700' : '#666';
            star.onclick = async () => {
                if (img.verified) {
                    img.rating = i;
                    await updateRatingInSupabase(img.id, i);
                    renderImages();
                } else {
                    alert("Only verified images can be rated.");
                }
            };
            rating.appendChild(star);
        }

        const dl = document.createElement('button');
        dl.className = 'downloadBtn';
        dl.textContent = "Download";
        dl.onclick = () => {
            const a = document.createElement('a');
            a.href = img.src;
            a.download = `profile_${(img.service || 'unknown').toLowerCase()}.png`;
            a.click();
        };

        // Add verification status badge
        const statusBadge = document.createElement('div');
        statusBadge.className = img.verified ? 'verified-badge' : 'pending-badge';
        statusBadge.textContent = img.verified ? '✓ Verified' : '⏳ Pending';

        // Add keywords display
        const keywordsDisplay = document.createElement('div');
        keywordsDisplay.style.color = '#888';
        keywordsDisplay.style.fontSize = '12px';
        keywordsDisplay.style.textAlign = 'center';
        keywordsDisplay.textContent = `Keywords: ${img.keywords || 'None'}`;

        box.appendChild(image);
        box.appendChild(rating);
        box.appendChild(keywordsDisplay);
        box.appendChild(statusBadge);
        box.appendChild(dl);
        grid.appendChild(box);
    });
}

// Format button functionality
formatBtn.onclick = () => {
    fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            const tempImg = reader.result;
            const service = prompt("Enter service to format for (Discord, YouTube, TikTok, Other):");
            if (!service) return alert("Service required.");

            const img = new Image();
            img.src = tempImg;
            img.onload = () => {
                let width = 512, height = 512;
                if(service.toLowerCase() === 'youtube') { width = 1280; height = 720; }
                else if(service.toLowerCase() === 'tiktok') { width = 1080; height = 1920; }
                // Discord default already set 512x512

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = `formatted_${service.toLowerCase()}_image.png`;
                a.click();
            };
        };
        reader.readAsDataURL(file);
    };
};
</script>
</body>
</html>
