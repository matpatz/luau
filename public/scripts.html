<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripts Hub</title>
<style>
  body { 
    background:#0f0f0f; 
    color:#eee; 
    font-family:sans-serif; 
    margin:0; 
    padding:2rem; 
  }
  h1 { text-align:center; margin-bottom:2rem; }
  h2 { margin-top:2rem; color:#fff; }
  .script-card { background:#222; padding:1rem; border-radius:6px; margin-bottom:1rem; }
  .script-header { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; justify-content:flex-start; }
  .script-title { font-weight:bold; font-size:1.1rem; }
  pre { background:#111; padding:0.5rem; border-radius:4px; overflow-x:auto; flex:1; margin:0; display:inline-block; }
  .copy-container { display:flex; align-items:center; gap:0.5rem; }
  .btn { background:#333; color:#eee; border:none; padding:0.5rem 1rem; border-radius:5px; cursor:pointer; }
  .btn:hover { background:#555; }
  .status { padding:0.2rem 0.5rem; border-radius:4px; font-size:0.8rem; font-weight:bold; }
  .UPDATED { background:#28a745; color:#fff; }
  .POPULAR { background:#fd7e14; color:#fff; }
  .PREMIUM { background:#dc3545; color:#fff; }
</style>
</head>
<body>
<h1>Available Scripts</h1>
<div id="scriptsContainer"></div>

<script>
const scripts = [
  { section: "Main" },
  {
    name: "Teen Titans Battleground",
    loadstring: 'loadstring(game:HttpGet("https://github.com/VoltexHub/ExtraScripts/raw/main/T-Titans%20BattlegroundM"))()',
    status: "UPDATED"
  },
  {
    name: "Grow a Garden dupe - local",
    loadstring: 'loadstring(game:HttpGet("https://github.com/VoltexHub/ExtraScripts/raw/main/Grow%20a%20Garden-%20Dupe"))()',
    status: "POPULAR"
  },
  {
    name: "Catastrophia",
    loadstring: 'loadstring(game:HttpGet("https://github.com/VoltexHub/ExtraScripts/raw/main/Catastrophia"))()',
    status: "UPDATED"
  },
  {
    name: "Catastrophia - premium",
    loadstring: 'setclipboard("https://discord.gg/bSPRYhBGtf")',
    status: "PREMIUM"
  },
  { section: "Universal" },
  {
    name: "Account Age- ESP",
    loadstring: 'loadstring(game:HttpGet("https://github.com/VoltexHub/ExtraScripts/raw/main/Account%20Age-%20ESP"))()',
    status: "UPDATED"
  },
  { section: "Dev Tools" },
  {
    name: "Fake Script",
    loadstring: 'print("hi")',
    status: "UPDATED"
  }
];

const container = document.getElementById('scriptsContainer');
container.innerHTML = '';

scripts.forEach(script => {
  if (script.section) {
    const header = document.createElement('h2');
    header.innerText = script.section;
    container.appendChild(header);
    return;
  }

  const card = document.createElement('div');
  card.className = 'script-card';
  card.innerHTML = `
    <div class="script-header">
      <span class="script-title">${script.name}</span>
      <span class="status ${script.status}">${script.status}</span>
    </div>
    <div class="copy-container">
      <pre>${script.loadstring}</pre>
      <button class="btn copyBtn">Copy</button>
    </div>
  `;
  container.appendChild(card);

  const copyBtn = card.querySelector('.copyBtn');
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(script.loadstring).then(() => {
      copyBtn.innerText = 'Copied!';
      setTimeout(() => copyBtn.innerText = 'Copy', 1500);
    });
  });
});
</script>
</body>
</html>
