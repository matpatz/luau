<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile Pictures</title>
<!-- Add Supabase client library -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
    body {
        margin: 0;
        background: #0f0f0f;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    header {
        width: 100%;
        padding: 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 15px;
        background: #111;
        position: sticky;
        top: 0;
        z-index: 10;
        padding-right: 40px; /* Move everything slightly left */
    }

    #search {
        padding: 6px 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
        width: 160px;
    }

    button {
        padding: 7px 14px;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
    }

    button:hover {
        background: #333;
    }

    #imageGrid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
        padding: 20px;
        max-width: 100vw;
        overflow-x: hidden;
        box-sizing: border-box;
    }

    .imgBox {
        background: #1b1b1b;
        padding: 12px;
        border-radius: 14px;
        width: 220px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .imgBox img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 12px;
    }

    .rating {
        display: flex;
        gap: 6px;
        align-self: flex-end;
    }

    .rating span {
        cursor: pointer;
        font-size: 20px;
    }

    .downloadBtn {
        width: 100%;
        padding: 6px 0;
        text-align: center;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
    }

    #verifyBoxContainer {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1a1a1a;
        padding: 20px;
        border-radius: 12px;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 20;
        border: 1px solid #333;
    }

    #verifyBoxContainer img {
        max-width: 400px;
        max-height: 400px;
        border-radius: 12px;
        border: 1px solid #444;
    }

    #verifyActions {
        display: flex;
        gap: 10px;
        align-items: center;
        width: 100%;
        justify-content: flex-start;
    }

    #verifyActions input, #verifyActions select, #verifyActions button {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #222;
        color: #fff;
        cursor: pointer;
    }

    #verifyActions input {
        width: 120px;
    }

    .pending-badge {
        background: #ff9800;
        color: #000;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        margin-top: 5px;
    }

    .verified-badge {
        background: #4CAF50;
        color: #000;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        margin-top: 5px;
    }

    .loading {
        color: #666;
        text-align: center;
        padding: 40px;
        font-style: italic;
    }

    .error {
        color: #ff4444;
        text-align: center;
        padding: 20px;
        background: #2a0f0f;
        border-radius: 8px;
        margin: 20px;
    }

    .close-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #ff4444;
        border: none;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        cursor: pointer;
        color: white;
        font-weight: bold;
    }
</style>
</head>

<body>
<header>
    <input id="search" placeholder="Search..." />
    <button id="formatBtn">Format Image</button>
    <button id="uploadBtn">Request Upload</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none;" />
</header>

<div id="verifyBoxContainer">
    <button class="close-btn" id="closeVerifyBtn">×</button>
    <img id="verifyImg" src="" />
    <div id="verifyActions">
        <input type="text" id="keywordsInput" placeholder="Keywords" />
        <select id="serviceSelect">
            <option value="">Select Service</option>
            <option value="Discord">Discord</option>
            <option value="YouTube">YouTube</option>
            <option value="TikTok">TikTok</option>
            <option value="Other">Other</option>
        </select>
        <button id="submitVerifyBtn">Submit for Review</button>
    </div>
</div>

<div id="imageGrid">
    <div class="loading">Loading images...</div>
</div>

<script>
// Initialize Supabase client with your credentials
const supabaseUrl = 'https://erctbeaqvqxjsrdjzonw.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyY3RiZWFxdnF4anNyZGp6b253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MzE2OTgsImV4cCI6MjA4MDIwNzY5OH0.Yal4o1NDY7p5W822mX7kaigTpPakTyygKLlp67ic6Kg';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let pendingUploads = [];
let verifiedImages = [];
let tempImageFile = null;
let tempImageUrl = null;

window.onload = async () => {
    await loadImagesFromSupabase();
    renderImages();
};

// Function to load images from Supabase
async function loadImagesFromSupabase() {
    try {
        const grid = document.getElementById('imageGrid');
        grid.innerHTML = '<div class="loading">Loading images...</div>';

        // Get only verified images
        const { data, error } = await supabase
            .from('profile_pictures')
            .select('*')
            .eq('verified', true)
            .order('created_at', { ascending: false });

        if (error) throw error;

        verifiedImages = data.map(item => ({
            id: item.id,
            src: item.url,
            service: item.service,
            keywords: item.keywords,
            rating: item.rating || 0,
            verified: item.verified
        }));

    } catch (error) {
        console.error('Error loading images:', error);
        const grid = document.getElementById('imageGrid');
        grid.innerHTML = '<div class="error">Error loading images. Please refresh the page.</div>';
    }
}

// Function to upload image to Supabase Storage
async function uploadImageToStorage(file, service, keywords) {
    try {
        // Create a unique filename
        const fileExt = file.name.split('.').pop();
        const fileName = `${service.toLowerCase()}_${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
        const filePath = `profile-pictures/${fileName}`;

        // Upload to Supabase Storage
        const { data: uploadData, error: uploadError } = await supabase.storage
            .from('images')
            .upload(filePath, file, {
                cacheControl: '3600',
                upsert: false
            });

        if (uploadError) throw uploadError;

        // Get public URL
        const { data: urlData } = supabase.storage
            .from('images')
            .getPublicUrl(filePath);

        return urlData.publicUrl;

    } catch (error) {
        console.error('Error uploading image:', error);
        throw error;
    }
}

// Function to save image metadata to Supabase
async function saveImageMetadata(imageUrl, service, keywords) {
    try {
        const { data, error } = await supabase
            .from('profile_pictures')
            .insert([
                {
                    url: imageUrl,
                    service: service,
                    keywords: keywords,
                    rating: 0,
                    verified: false,
                    created_at: new Date().toISOString()
                }
            ])
            .select();

        if (error) throw error;
        
        console.log('Image metadata saved to Supabase:', data);
        return data[0].id;

    } catch (error) {
        console.error('Error saving image metadata:', error);
        throw error;
    }
}

// Function to update rating in Supabase
async function updateRatingInSupabase(imageId, rating) {
    try {
        const { error } = await supabase
            .from('profile_pictures')
            .update({ rating: rating })
            .eq('id', imageId);

        if (error) throw error;
        
    } catch (error) {
        console.error('Error updating rating:', error);
    }
}

const searchBox = document.getElementById('search');
searchBox.addEventListener('input', renderImages);

const fileInput = document.getElementById('fileInput');
const formatBtn = document.getElementById('formatBtn');
const uploadBtn = document.getElementById('uploadBtn');
const verifyBoxContainer = document.getElementById('verifyBoxContainer');
const verifyImg = document.getElementById('verifyImg');
const keywordsInput = document.getElementById('keywordsInput');
const serviceSelect = document.getElementById('serviceSelect');
const submitVerifyBtn = document.getElementById('submitVerifyBtn');
const closeVerifyBtn = document.getElementById('closeVerifyBtn');

uploadBtn.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    // Check file size (limit to 5MB)
    if (file.size > 5 * 1024 * 1024) {
        alert("File size too large. Please upload images under 5MB.");
        return;
    }
    
    // Check file type
    if (!file.type.match('image.*')) {
        alert("Please select an image file.");
        return;
    }
    
    // Store the file object
    tempImageFile = file;
    
    // Create preview URL
    tempImageUrl = URL.createObjectURL(file);
    verifyImg.src = tempImageUrl;
    verifyBoxContainer.style.display = 'flex';
};

formatBtn.onclick = () => {
    fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = () => {
            const tempImage = reader.result;
            const service = prompt("Enter service to format for (Discord, YouTube, TikTok, Other):");
            if (!service) return alert("Service required.");

            const img = new Image();
            img.src = tempImage;
            img.onload = () => {
                let width = 512, height = 512;
                if(service.toLowerCase() === 'youtube') { width = 1280; height = 720; }
                else if(service.toLowerCase() === 'tiktok') { width = 1080; height = 1920; }
                // Discord default already set 512x512

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = `formatted_${service.toLowerCase()}_image.png`;
                a.click();
            };
        };
        reader.readAsDataURL(file);
    };
};

closeVerifyBtn.onclick = () => {
    verifyBoxContainer.style.display = 'none';
    if (tempImageUrl) {
        URL.revokeObjectURL(tempImageUrl);
        tempImageUrl = null;
    }
    tempImageFile = null;
    keywordsInput.value = '';
    serviceSelect.value = '';
    fileInput.value = '';
};

submitVerifyBtn.onclick = async () => {
    if (!tempImageFile || !tempImageUrl) {
        alert("No image to submit.");
        return;
    }
    
    if (!serviceSelect.value) {
        alert("Please select a service.");
        return;
    }
    
    const keywords = keywordsInput.value.trim();
    if (!keywords) {
        alert("Please enter keywords.");
        return;
    }

    // Show loading state
    submitVerifyBtn.textContent = 'Uploading...';
    submitVerifyBtn.disabled = true;

    try {
        // 1. Upload image to Supabase Storage
        const imageUrl = await uploadImageToStorage(tempImageFile, serviceSelect.value, keywords);
        
        // 2. Save metadata to database
        const imageId = await saveImageMetadata(imageUrl, serviceSelect.value, keywords);
        
        if (imageId) {
            // Add to pending uploads locally
            pendingUploads.push({
                id: imageId,
                src: imageUrl,
                rating: 0,
                service: serviceSelect.value,
                keywords: keywords,
                verified: false
            });
            
            alert("✅ Upload submitted for review! The image will appear in the gallery once verified.");
        } else {
            alert("Failed to save image metadata. Please try again.");
        }
        
    } catch (error) {
        console.error('Upload error:', error);
        alert("❌ Upload failed. Please check console for details and try again.");
    } finally {
        // Reset UI
        verifyBoxContainer.style.display = 'none';
        if (tempImageUrl) {
            URL.revokeObjectURL(tempImageUrl);
            tempImageUrl = null;
        }
        tempImageFile = null;
        keywordsInput.value = '';
        serviceSelect.value = '';
        fileInput.value = '';
        
        submitVerifyBtn.textContent = 'Submit for Review';
        submitVerifyBtn.disabled = false;
        
        // Refresh display
        renderImages();
    }
};

function renderImages() {
    const grid = document.getElementById('imageGrid');
    grid.innerHTML = '';
    const query = searchBox.value.toLowerCase();
    
    // Combine verified and pending images
    const allImages = [...verifiedImages, ...pendingUploads];
    
    // Filter images based on search query
    const filteredImages = allImages.filter(img => 
        (img.service && img.service.toLowerCase().includes(query)) || 
        (img.keywords && img.keywords.toLowerCase().includes(query))
    );
    
    // Display filtered images
    filteredImages.forEach(img => {
        const box = document.createElement('div');
        box.className = 'imgBox';

        const image = document.createElement('img');
        image.src = img.src;
        image.alt = `${img.service || 'Unknown'} profile picture`;
        image.onerror = function() {
            this.src = 'https://via.placeholder.com/220x200/1a1a1a/666666?text=Image+Error';
        };

        const rating = document.createElement('div');
        rating.className = 'rating';
        for (let i = 1; i <= 5; i++) {
            const star = document.createElement('span');
            star.textContent = i <= img.rating ? '★' : '☆';
            star.style.color = i <= img.rating ? '#ffd700' : '#666';
            star.onclick = async () => {
                if (img.verified) {
                    img.rating = i;
                    await updateRatingInSupabase(img.id, i);
                    renderImages();
                } else {
                    alert("Only verified images can be rated.");
                }
            };
            rating.appendChild(star);
        }

        const dl = document.createElement('button');
        dl.className = 'downloadBtn';
        dl.textContent = "Download";
        dl.onclick = async () => {
            try {
                const response = await fetch(img.src);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `profile_${(img.service || 'unknown').toLowerCase()}_${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error('Download error:', error);
                alert('Failed to download image. Please try again.');
            }
        };

        // Add verification status badge
        const statusBadge = document.createElement('div');
        statusBadge.className = img.verified ? 'verified-badge' : 'pending-badge';
        statusBadge.textContent = img.verified ? '✓ Verified' : '⏳ Pending Review';

        // Add keywords display
        const keywordsDisplay = document.createElement('div');
        keywordsDisplay.style.color = '#888';
        keywordsDisplay.style.fontSize = '12px';
        keywordsDisplay.style.textAlign = 'center';
        keywordsDisplay.style.width = '100%';
        keywordsDisplay.style.overflow = 'hidden';
        keywordsDisplay.style.textOverflow = 'ellipsis';
        keywordsDisplay.style.whiteSpace = 'nowrap';
        keywordsDisplay.textContent = `Keywords: ${img.keywords || 'None'}`;

        box.appendChild(image);
        box.appendChild(rating);
        box.appendChild(keywordsDisplay);
        box.appendChild(statusBadge);
        box.appendChild(dl);
        grid.appendChild(box);
    });
    
    // Show message if no images found
    if (filteredImages.length === 0) {
        const message = document.createElement('div');
        message.style.textAlign = 'center';
        message.style.width = '100%';
        message.style.padding = '40px';
        message.style.color = '#666';
        message.textContent = query ? 'No images found for your search.' : 'No images available yet. Be the first to upload one!';
        grid.appendChild(message);
    }
}
</script>
</body>
</html>
