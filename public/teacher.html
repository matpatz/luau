<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Voltex Classroom Randomizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0a0f1a;
      color: #e0f0ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      color: #4dc3ff;
      text-shadow: 0 0 10px rgba(77,195,255,0.6);
    }
    .grid {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 1100px;
      margin-bottom: 18px;
    }
    .panel {
      background: #132235;
      border: 1px solid rgba(77,195,255,0.25);
      border-radius: 14px;
      padding: 18px;
      flex: 1 1 300px;
      min-width: 260px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.45);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .panel h2 { 
      margin: 0 0 6px 0; 
      color: #66d9ff;
      font-size: 18px;
    }
    .muted { color: #bfefff; opacity: 0.9; font-size: 13px }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      background: #1e3d5c;
      color: #e0f8ff;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.18s, transform 0.18s, box-shadow 0.18s;
      white-space:nowrap;
      cursor:pointer;
    }
    .btn:hover { 
      background: #2a5b87;
      transform: translateY(-2px);
      box-shadow: 0 0 12px rgba(77,195,255,0.45);
    }
    textarea, input {
      width: 100%;
      border-radius: 8px;
      padding: 8px;
      border: none;
      outline: none;
      font-family: 'Orbitron', sans-serif;
      margin-top: 6px;
    }
    #results div {
      background: #1e3d5c;
      padding: 6px 10px;
      border-radius: 8px;
    }
    footer {
      margin-top: 18px;
      opacity: 0.8;
      font-size: 14px;
      color: #99cfff;
    }
    @media (max-width:720px){
      .grid{gap:12px}
      .panel{flex:1 1 100%}
    }
  </style>
</head>
<body>
  <h1>Voltex Classroom Randomizer</h1>

  <div class="grid">

    <div class="panel">
      <div class="left">
        <h2>Enter Students</h2>
        <div class="muted">Manual entry or paste JSON array from Google Classroom</div>
        <textarea id="studentInput" rows="6" placeholder="One student per line or JSON array"></textarea>
        <input type="text" id="rolesInput" placeholder="Optional: comma-separated roles">
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px;">
        <button class="btn" onclick="assignRandomNumbers()">Random Numbers</button>
        <button class="btn" onclick="assignRoles()">Assign Roles</button>
      </div>
    </div>

    <div class="panel" id="resultsPanel" style="display:none;">
      <h2>Results</h2>
      <div id="results" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>

  </div>

  <footer>
    © <span id="year"></span> Voltex
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function parseStudents() {
      const input = document.getElementById('studentInput').value.trim();
      if (!input) return [];
      try {
        const parsed = JSON.parse(input);
        if (Array.isArray(parsed)) return parsed;
      } catch {}
      return input.split('\n').map(s => s.trim()).filter(s => s);
    }

    function assignRandomNumbers() {
      const students = parseStudents();
      if (!students.length) return alert('No students!');
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';
      students.forEach(s => {
        const div = document.createElement('div');
        div.textContent = `${s} → ${Math.floor(Math.random()*100)+1}`;
        resultsDiv.appendChild(div);
      });
      document.getElementById('resultsPanel').style.display='flex';
    }

    function assignRoles() {
      const students = parseStudents();
      if (!students.length) return alert('No students!');
      const roles = document.getElementById('rolesInput').value.split(',').map(r=>r.trim()).filter(r=>r);
      if (!roles.length) return alert('Enter at least one role!');
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';
      students.forEach(s => {
        const role = roles[Math.floor(Math.random()*roles.length)];
        const div = document.createElement('div');
        div.textContent = `${s} → ${role}`;
        resultsDiv.appendChild(div);
      });
      document.getElementById('resultsPanel').style.display='flex';
    }
  </script>
</body>
</html>
