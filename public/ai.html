<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free AI News Generator</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}
header {
  background: #2563eb;
  color: white;
  width: 100%;
  padding: 15px;
  text-align: center;
  font-size: 1.5em;
  font-weight: bold;
}
.container {
  max-width: 800px;
  width: 90%;
  margin: 20px auto;
  background: white;
  padding: 20px 30px;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}
input, button {
  padding: 10px;
  font-size: 1em;
  border-radius: 8px;
  border: 1px solid #ccc;
}
button {
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
}
button:hover { background: #1d4ed8; }
#article {
  margin-top: 20px;
}
h2 { margin-bottom: 5px; }
h4 { margin-top: 0; color: #6b7280; font-weight: normal; }
p { line-height: 1.6; margin-bottom: 10px; }
</style>
</head>
<body>
<header>Free AI News Generator</header>
<div class="container">
  <input type="text" id="topicInput" placeholder="Enter news topic" style="width:70%;">
  <button id="generateBtn">Generate Article</button>
  <div id="article"></div>
</div>

<script>
// Templates for unbiased news
const headlines = [
  "Recent developments in {topic}",
  "{topic} updates: what you need to know",
  "Breaking news: {topic}",
  "Experts discuss {topic}"
];

const introTemplates = [
  "Today, {topic} has been in focus as recent events unfold.",
  "Recent reports highlight key points about {topic}.",
  "{topic} has captured attention in recent developments."
];

const bodyTemplates = [
  "According to reliable sources, {topic} is being monitored carefully.",
  "Authorities and experts agree that {topic} requires attention.",
  "Various perspectives indicate that {topic} is evolving, with ongoing discussions about its impact."
];

function randomChoice(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateArticle(topic) {
  const headline = randomChoice(headlines).replace("{topic}", topic);
  const intro = randomChoice(introTemplates).replace("{topic}", topic);
  const body = randomChoice(bodyTemplates).replace(/{topic}/g, topic);

  return { headline, intro, body };
}

document.getElementById('generateBtn').addEventListener('click', () => {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) return;

  const article = generateArticle(topic);
  const articleDiv = document.getElementById('article');
  articleDiv.innerHTML = `
    <h2>${article.headline}</h2>
    <h4>By Free Sigma AI | ${new Date().toLocaleDateString()}</h4>
    <p>${article.intro}</p>
    <p>${article.body}</p>
  `;
});
</script>
</body>
</html>
