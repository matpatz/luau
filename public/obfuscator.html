<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lua Obfuscator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.container{width:100%;max-width:700px;padding:20px;}
.title{text-align:center;font-size:28px;margin-bottom:20px;color:#00eeff;text-shadow:0 0 10px rgba(0,238,255,0.5);}
.panel{display:flex;flex-direction:column;gap:15px;}
.textarea-field{padding:12px;border-radius:6px;border:2px solid #39396b;background:rgba(30,30,60,0.8);color:#fff;font-size:14px;font-family:monospace;width:100%;min-height:400px;resize:vertical;}
.button-box{background:rgba(0,238,255,0.1);border-radius:8px;padding:5px;display:flex;gap:10px;}
.enter-btn{padding:12px 20px;border-radius:6px;border:none;background:linear-gradient(135deg,#00c6ff,#0072ff);color:white;font-weight:bold;cursor:pointer;transition:all 0.3s;}
.enter-btn:hover{background:linear-gradient(135deg,#00eeff,#008cff);transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,238,255,0.4);}
.inline-msg{margin-top:5px;font-size:14px;}
.inline-msg.success{color:#55ff55;}
.inline-msg.error{color:#ff5555;}
</style>
</head>
<body>
<div class="container">
<h1 class="title">Advanced Lua Obfuscator</h1>
<div class="panel">
  <textarea class="textarea-field" id="luaBox" placeholder="Paste your Lua script here..."></textarea>
  <div class="button-box">
    <button class="enter-btn" id="obfuscateBtn">Obfuscate</button>
  </div>
  <div id="feedback" class="inline-msg"></div>
</div>
</div>

<script>
const luaBox = document.getElementById('luaBox');
const obfuscateBtn = document.getElementById('obfuscateBtn');
const feedback = document.getElementById('feedback');

function showFeedback(msg,type='success'){
  feedback.textContent = msg;
  feedback.className = 'inline-msg ' + (type==='success'?'success':'error');
}

function randomVar(){ return "_v"+Math.floor(Math.random()*100000+Math.random()*1000); }

function encodeStrings(lua){
  return lua.replace(/(["'])(.*?)\1/g,(m,q,s)=>{
    return `decode64("${btoa(s)}")`;
  });
}

function encodeNumbers(lua){
  return lua.replace(/\b\d+(\.\d+)?\b/g,n=>{
    const num = parseFloat(n);
    const a = Math.floor(Math.random()*num);
    const b = num - a;
    return `(${a}+${b})`;
  });
}

function addJunkCode(lua){
  const junk = [
    `local ${randomVar()} = math.random()`,
    `local ${randomVar()} = {} for i=1,5 do table.insert(${randomVar()},i) end`,
    `local ${randomVar()} = "${btoa("junk")}"`,
  ];
  const lines = lua.split(";");
  for(let i=0;i<lines.length;i+=2){
    if(Math.random()<0.3) lines[i] += `;${junk[Math.floor(Math.random()*junk.length)]}`;
  }
  return lines.join(";");
}

function obfuscateLua(lua){
  try{
    // Remove comments & whitespace
    lua = lua.replace(/--\[==*\[.*?\]==*\]/gs,"").replace(/--.*$/gm,"");
    lua = lua.replace(/\s+/g," ").trim();

    // Randomize identifiers
    const identifiers = {};
    lua = lua.replace(/\b(local\s+)?(function\s+)?([a-zA-Z_][a-zA-Z0-9_]*)\b/g,(m,localKw,funcKw,name)=>{
      const reserved = ["function","end","if","then","else","for","in","do","while","repeat","until","return","break","true","false","nil","getgenv","game","workspace"];
      if(reserved.includes(name)) return m;
      if(!identifiers[name]) identifiers[name] = randomVar();
      return (localKw||"") + (funcKw||"") + identifiers[name];
    });

    // Encode strings & numbers
    lua = encodeStrings(lua);
    lua = encodeNumbers(lua);

    // Add junk/no-op code
    lua = addJunkCode(lua);

    // Add decode64 function
    if(lua.includes('decode64')){
      lua = `local decode64=function(s) return game:GetService("HttpService"):Base64Decode(s) end\n` + lua;
    }

    return lua;
  }catch(e){
    showFeedback("Obfuscation failed","error");
    return "";
  }
}

obfuscateBtn.addEventListener('click', ()=>{
  const code = luaBox.value.trim();
  if(!code){ showFeedback("Paste a Lua script first","error"); return; }
  const obf = obfuscateLua(code);
  luaBox.value = obf;
  showFeedback("Obfuscation complete","success");
});
</script>
</body>
</html>
