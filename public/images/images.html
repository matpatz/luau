<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile Pictures</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
    body {
        margin: 0;
        background: #0f0f0f;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    header {
        width: 100%;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #111;
        position: sticky;
        top: 0;
        z-index: 10;
        padding-right: 40px;
    }

    .header-left {
        display: flex;
        gap: 15px;
        align-items: center;
    }

    .admin-link {
        color: #4CAF50;
        text-decoration: none;
        font-size: 14px;
        margin-left: 20px;
    }

    .admin-link:hover {
        text-decoration: underline;
    }

    #search {
        padding: 6px 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
        width: 160px;
    }

    button {
        padding: 7px 14px;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
    }

    button:hover {
        background: #333;
    }

    #imageGrid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
        padding: 20px;
        max-width: 100vw;
        overflow-x: hidden;
        box-sizing: border-box;
    }

    .imgBox {
        background: #1b1b1b;
        padding: 12px;
        border-radius: 14px;
        width: 220px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: relative;
    }

    .imgBox img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
    }

    .keywords-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 5px;
    }

    .keywords-label {
        color: #888;
        font-size: 12px;
        white-space: nowrap;
    }

    .keywords-text {
        color: #ccc;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex-grow: 1;
    }

    .bottom-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 5px;
    }

    .rating {
        display: flex;
        gap: 4px;
        align-items: center;
    }

    .rating span {
        cursor: pointer;
        font-size: 18px;
    }

    .status-badge {
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
    }

    .pending-badge {
        background: #ff9800;
        color: #000;
    }

    .verified-badge {
        background: #4CAF50;
        color: #000;
    }

    .downloadBtn {
        width: 100%;
        padding: 6px 0;
        text-align: center;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
        margin-top: 8px;
    }

    #verifyBoxContainer {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1a1a1a;
        padding: 20px;
        border-radius: 12px;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 20;
        border: 1px solid #333;
    }

    #verifyBoxContainer img {
        max-width: 400px;
        max-height: 400px;
        border-radius: 12px;
        border: 1px solid #444;
    }

    #verifyActions {
        display: flex;
        gap: 10px;
        align-items: center;
        width: 100%;
        justify-content: flex-start;
    }

    #verifyActions input, #verifyActions select, #verifyActions button {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #222;
        color: #fff;
        cursor: pointer;
    }

    #verifyActions input {
        width: 120px;
    }

    .close-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #ff4444;
        border: none;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        cursor: pointer;
        color: white;
        font-weight: bold;
    }

    .service-tag {
        display: inline-block;
        background: #333;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        color: #ccc;
        margin-top: 5px;
    }
</style>
</head>

<body>
<header>
    <div class="header-left">
        <input id="search" placeholder="Search..." />
        <button id="formatBtn">Format Image</button>
        <button id="uploadBtn">Request Upload</button>
        <a href="admin.html" class="admin-link">Admin</a>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none;" />
</header>

<div id="verifyBoxContainer">
    <button class="close-btn" id="closeVerifyBtn">×</button>
    <img id="verifyImg" src="" />
    <div id="verifyActions">
        <input type="text" id="keywordsInput" placeholder="Keywords" />
        <select id="serviceSelect">
            <option value="">Select Service</option>
            <option value="Discord">Discord</option>
            <option value="YouTube">YouTube</option>
            <option value="TikTok">TikTok</option>
            <option value="Other">Other</option>
        </select>
        <button id="submitVerifyBtn">Submit</button>
    </div>
</div>

<div id="imageGrid"></div>

<script>
// Supabase setup
const supabaseUrl = 'https://erctbeaqvqxjsrdjzonw.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyY3RiZWFxdnF4anNyZGp6b253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MzE2OTgsImV4cCI6MjA4MDIwNzY5OH0.Yal4o1NDY7p5W822mX7kaigTpPakTyygKLlp67ic6Kg';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// Cache images and last fetch time
let verifiedImages = [];
let lastFetchTime = 0;
const CACHE_DURATION = 30000; // 30 seconds cache

// Load images with caching
async function loadImagesFromSupabase() {
    const now = Date.now();
    
    // Return cached data if within cache duration
    if (verifiedImages.length > 0 && (now - lastFetchTime) < CACHE_DURATION) {
        console.log('Using cached images');
        renderImages();
        return;
    }

    try {
        console.log('Fetching images from Supabase...');
        const { data, error } = await supabase
            .from('profile_pictures')
            .select('*')
            .eq('verified', true)
            .order('created_at', { ascending: false })
            .limit(100); // Limit to prevent overfetching

        if (error) throw error;

        verifiedImages = data.map(item => ({
            id: item.id,
            src: item.url,
            service: item.service,
            keywords: item.keywords,
            rating: item.rating || 0,
            verified: true,
            created_at: item.created_at
        }));

        lastFetchTime = Date.now();
        renderImages();
        
        // Store in localStorage as backup
        localStorage.setItem('cachedImages', JSON.stringify({
            images: verifiedImages,
            timestamp: lastFetchTime
        }));
        
    } catch (error) {
        console.error('Error loading images:', error);
        // Try to load from localStorage cache
        const cached = localStorage.getItem('cachedImages');
        if (cached) {
            const cacheData = JSON.parse(cached);
            verifiedImages = cacheData.images || [];
            renderImages();
        }
    }
}

// Save image (optimized - single API call)
async function saveImageToSupabase(imageData) {
    try {
        const { data, error } = await supabase
            .from('profile_pictures')
            .insert([
                {
                    url: imageData.src,
                    service: imageData.service,
                    keywords: imageData.keywords,
                    rating: 0,
                    verified: false,
                    created_at: new Date().toISOString()
                }
            ])
            .select()
            .single();

        if (error) throw error;
        
        console.log('Image saved with ID:', data.id);
        return data.id;
        
    } catch (error) {
        console.error('Error saving image:', error);
        return null;
    }
}

// Update rating (debounced)
let ratingTimeout;
async function updateRatingInSupabase(imageId, rating) {
    clearTimeout(ratingTimeout);
    
    ratingTimeout = setTimeout(async () => {
        try {
            const { error } = await supabase
                .from('profile_pictures')
                .update({ rating: rating })
                .eq('id', imageId);

            if (error) throw error;
            console.log('Rating updated for:', imageId);
            
        } catch (error) {
            console.error('Error updating rating:', error);
        }
    }, 1000); // 1 second debounce
}

// Initial load
window.onload = loadImagesFromSupabase;

// Search functionality
const searchBox = document.getElementById('search');
let searchTimeout;
searchBox.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(renderImages, 300);
});

// UI Elements
const fileInput = document.getElementById('fileInput');
const formatBtn = document.getElementById('formatBtn');
const uploadBtn = document.getElementById('uploadBtn');
const verifyBoxContainer = document.getElementById('verifyBoxContainer');
const verifyImg = document.getElementById('verifyImg');
const keywordsInput = document.getElementById('keywordsInput');
const serviceSelect = document.getElementById('serviceSelect');
const submitVerifyBtn = document.getElementById('submitVerifyBtn');
const closeVerifyBtn = document.getElementById('closeVerifyBtn');

// Event Listeners
uploadBtn.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    // Size check
    if (file.size > 2 * 1024 * 1024) {
        alert("Max size: 2MB");
        return;
    }
    
    const reader = new FileReader();
    reader.onload = () => {
        verifyImg.src = reader.result;
        verifyBoxContainer.style.display = 'flex';
    };
    reader.readAsDataURL(file);
};

closeVerifyBtn.onclick = () => {
    verifyBoxContainer.style.display = 'none';
    keywordsInput.value = '';
    serviceSelect.value = '';
    fileInput.value = '';
};

submitVerifyBtn.onclick = async () => {
    if (!verifyImg.src) {
        alert("No image to submit.");
        return;
    }
    
    if (!serviceSelect.value) {
        alert("Select a service.");
        return;
    }
    
    const keywords = keywordsInput.value.trim();
    if (!keywords) {
        alert("Enter keywords.");
        return;
    }

    // Disable button during upload
    const originalText = submitVerifyBtn.textContent;
    submitVerifyBtn.textContent = 'Uploading...';
    submitVerifyBtn.disabled = true;

    try {
        const imageData = {
            src: verifyImg.src,
            service: serviceSelect.value,
            keywords: keywords
        };

        const imageId = await saveImageToSupabase(imageData);
        
        if (imageId) {
            alert("✅ Submitted for review!");
        } else {
            alert("⚠️ Saved locally only.");
        }
        
    } catch (error) {
        console.error('Upload error:', error);
        alert("❌ Upload failed.");
    } finally {
        // Reset UI
        verifyBoxContainer.style.display = 'none';
        keywordsInput.value = '';
        serviceSelect.value = '';
        fileInput.value = '';
        submitVerifyBtn.textContent = originalText;
        submitVerifyBtn.disabled = false;
    }
};

// Format image
formatBtn.onclick = () => {
    fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            const tempImg = reader.result;
            const service = prompt("Service to format for (Discord, YouTube, TikTok, Other):");
            if (!service) return;

            const img = new Image();
            img.src = tempImg;
            img.onload = () => {
                let width = 512, height = 512;
                if(service.toLowerCase() === 'youtube') { width = 1280; height = 720; }
                else if(service.toLowerCase() === 'tiktok') { width = 1080; height = 1920; }

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = `formatted_${service.toLowerCase()}.png`;
                a.click();
            };
        };
        reader.readAsDataURL(file);
    };
};

// Render images with new layout
function renderImages() {
    const grid = document.getElementById('imageGrid');
    const query = searchBox.value.toLowerCase();
    
    // Filter images
    const filteredImages = verifiedImages.filter(img => {
        if (!img) return false;
        const serviceMatch = img.service && img.service.toLowerCase().includes(query);
        const keywordMatch = img.keywords && img.keywords.toLowerCase().includes(query);
        return serviceMatch || keywordMatch;
    });
    
    if (filteredImages.length === 0) {
        grid.innerHTML = `
            <div style="text-align:center; width:100%; padding:60px; color:#666;">
                ${query ? 'No images found.' : 'No images yet.'}
            </div>
        `;
        return;
    }
    
    // Create image grid
    grid.innerHTML = filteredImages.map(img => `
        <div class="imgBox">
            <div class="keywords-row">
                <span class="keywords-label">Keywords:</span>
                <span class="keywords-text" title="${img.keywords || ''}">
                    ${img.keywords || 'None'}
                </span>
            </div>
            
            <img src="${img.src}" 
                 alt="${img.service || 'Profile'}" 
                 onerror="this.src='data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"220\" height=\"180\"><rect width=\"100%\" height=\"100%\" fill=\"%231a1a1a\"/><text x=\"50%\" y=\"50%\" fill=\"%23666\" font-size=\"14\" text-anchor=\"middle\" dy=\".3em\">Image</text></svg>';">
            
            <div class="service-tag">${img.service || 'Unknown'}</div>
            
            <div class="bottom-row">
                <div class="rating">
                    ${[1,2,3,4,5].map(i => `
                        <span style="color:${i <= img.rating ? '#ffd700' : '#666'}" 
                              onclick="rateImage('${img.id}', ${i})">
                            ${i <= img.rating ? '★' : '☆'}
                        </span>
                    `).join('')}
                </div>
                
                <div class="status-badge ${img.verified ? 'verified-badge' : 'pending-badge'}">
                    ${img.verified ? '✓' : '⏳'}
                </div>
            </div>
            
            <button class="downloadBtn" onclick="downloadImage('${img.src}', '${img.service || 'profile'}')">
                Download
            </button>
        </div>
    `).join('');
}

// Rate image function
async function rateImage(imageId, rating) {
    const image = verifiedImages.find(img => img.id === imageId);
    if (!image) return;
    
    image.rating = rating;
    renderImages();
    await updateRatingInSupabase(imageId, rating);
}

// Download image function
function downloadImage(src, service) {
    const a = document.createElement('a');
    a.href = src;
    a.download = `profile_${service.toLowerCase().replace(/\s+/g, '_')}_${Date.now()}.png`;
    a.click();
}

// Auto-refresh every 2 minutes
setInterval(() => {
    if (document.visibilityState === 'visible') {
        loadImagesFromSupabase();
    }
}, 120000);
</script>
</body>
</html>
