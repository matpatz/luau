<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripts</title>
<style>
  body { background:#0f0f0f; color:#eee; font-family:sans-serif; margin:0; padding:2rem; }
  h1 { text-align:center; margin-bottom:2rem; }
  .script-card { background:#222; padding:1rem; border-radius:6px; display:flex; align-items:center; margin-bottom:1rem; flex-wrap:wrap; }
  pre { background:#111; padding:0.5rem; border-radius:4px; overflow-x:auto; flex:1; margin:0; }
  .btn { background:#333; color:#eee; border:none; padding:0.5rem 1rem; border-radius:5px; cursor:pointer; margin-left:0.5rem; }
  .btn:hover { background:#555; }
  .status { padding:0.2rem 0.5rem; border-radius:4px; font-size:0.8rem; font-weight:bold; margin-left:0.5rem; }
  .UPDATED { background:#28a745; color:#fff; }
  .POPULAR { background:#fd7e14; color:#fff; }
  .PREMIUM { background:#dc3545; color:#fff; }
</style>
</head>
<body>
<h1>Available Scripts</h1>
<div id="scriptsContainer">Loading scripts...</div>

<script>
const scripts = [
  {
    name: "Adopt Me",
    loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/VoltexHub/ExtraScripts/main/adoptme.lua"))()',
    status: "UPDATED"
  },
  {
    name: "Blox Fruits",
    loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/VoltexHub/ExtraScripts/main/bloxfruits.lua"))()',
    status: "POPULAR"
  },
  {
    name: "Arsenal",
    loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/VoltexHub/ExtraScripts/main/arsenal.lua"))()',
    status: "PREMIUM"
  }
];

const container = document.getElementById('scriptsContainer');
container.innerHTML = '';

scripts.forEach(script => {
  const card = document.createElement('div');
  card.className = 'script-card';
  card.innerHTML = `
    <div style="flex:1; display:flex; align-items:center; gap:0.5rem;">
      <pre>${script.loadstring}</pre>
      <button class="btn copyBtn">Copy</button>
    </div>
    <span class="status ${script.status}">${script.status}</span>
  `;
  container.appendChild(card);

  const copyBtn = card.querySelector('.copyBtn');
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(script.loadstring).then(() => {
      copyBtn.innerText = 'Copied!';
      setTimeout(() => copyBtn.innerText = 'Copy', 1500);
    });
  });
});
</script>
</body>
</html>
