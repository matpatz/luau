<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel - Image Verification</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #0f0f0f;
        color: white;
        min-height: 100vh;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }

    /* Login Page */
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-box {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .login-box h1 {
        text-align: center;
        margin-bottom: 30px;
        color: white;
        font-size: 28px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: rgba(255, 255, 255, 0.9);
        font-size: 14px;
    }

    .form-group input {
        width: 100%;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        color: white;
        font-size: 16px;
        transition: all 0.3s;
    }

    .form-group input:focus {
        outline: none;
        border-color: #4CAF50;
        background: rgba(255, 255, 255, 0.15);
    }

    .login-btn {
        width: 100%;
        padding: 14px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
    }

    .login-btn:hover {
        background: #45a049;
    }

    .error-message {
        color: #ff4444;
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    /* Admin Dashboard */
    .dashboard {
        display: none;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        margin-bottom: 30px;
        border-bottom: 1px solid #333;
    }

    .header h1 {
        font-size: 24px;
        color: #4CAF50;
    }

    .logout-btn {
        padding: 8px 20px;
        background: #ff4444;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
    }

    .logout-btn:hover {
        background: #ff3333;
    }

    /* Stats */
    .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .stat-card {
        background: #1a1a1a;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        border: 1px solid #333;
    }

    .stat-card h3 {
        font-size: 14px;
        color: #888;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .stat-card .number {
        font-size: 32px;
        font-weight: bold;
        color: #4CAF50;
    }

    /* Pending Images Grid */
    .pending-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .image-card {
        background: #1a1a1a;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #333;
        transition: transform 0.3s;
    }

    .image-card:hover {
        transform: translateY(-5px);
        border-color: #4CAF50;
    }

    .image-card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-bottom: 1px solid #333;
    }

    .image-info {
        padding: 15px;
    }

    .image-info h3 {
        margin-bottom: 10px;
        color: #fff;
    }

    .image-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 15px;
    }

    .meta-tag {
        background: #333;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        color: #ccc;
    }

    .service-tag {
        background: #2196F3;
        color: white;
    }

    .actions {
        display: flex;
        gap: 10px;
    }

    .action-btn {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.3s;
    }

    .approve-btn {
        background: #4CAF50;
        color: white;
    }

    .approve-btn:hover {
        background: #45a049;
    }

    .reject-btn {
        background: #ff4444;
        color: white;
    }

    .reject-btn:hover {
        background: #ff3333;
    }

    /* Verified Images */
    .verified-section {
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid #333;
    }

    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .section-header h2 {
        color: #4CAF50;
    }

    .refresh-btn {
        padding: 8px 16px;
        background: #2196F3;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    .refresh-btn:hover {
        background: #1976D2;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #666;
        font-size: 18px;
        background: #1a1a1a;
        border-radius: 10px;
        border: 2px dashed #333;
    }

    .empty-state i {
        font-size: 48px;
        margin-bottom: 20px;
        display: block;
    }

    /* Loading */
    .loading {
        text-align: center;
        padding: 40px;
        color: #666;
    }

    .loading-spinner {
        border: 4px solid #333;
        border-top: 4px solid #4CAF50;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>

<body>
<!-- Login Page -->
<div id="loginPage" class="login-container">
    <div class="login-box">
        <h1>Admin Login</h1>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button class="login-btn" onclick="login()">Login</button>
        <div id="loginError" class="error-message"></div>
        <div style="margin-top: 20px; color: #888; font-size: 12px; text-align: center;">

        </div>
    </div>
</div>

<!-- Admin Dashboard -->
<div id="dashboard" class="dashboard container">
    <div class="header">
        <h1>Image Verification Panel</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="stats">
        <div class="stat-card">
            <h3>Pending Review</h3>
            <div class="number" id="pendingCount">0</div>
        </div>
        <div class="stat-card">
            <h3>Verified</h3>
            <div class="number" id="verifiedCount">0</div>
        </div>
        <div class="stat-card">
            <h3>Total Images</h3>
            <div class="number" id="totalCount">0</div>
        </div>
    </div>

    <div class="pending-section">
        <h2 style="color: #ff9800; margin-bottom: 20px;">⏳ Pending Images</h2>
        <div id="pendingImages" class="pending-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                Loading pending images...
            </div>
        </div>
    </div>

    <div class="verified-section">
        <div class="section-header">
            <h2>✓ Verified Images</h2>
            <button class="refresh-btn" onclick="loadAllImages()">Refresh</button>
        </div>
        <div id="verifiedImages" class="pending-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                Loading verified images...
            </div>
        </div>
    </div>
</div>

<script>
// Supabase setup
const supabaseUrl = 'https://erctbeaqvqxjsrdjzonw.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyY3RiZWFxdnF4anNyZGp6b253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MzE2OTgsImV4cCI6MjA4MDIwNzY5OH0.Yal4o1NDY7p5W822mX7kaigTpPakTyygKLlp67ic6Kg';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let adminLoggedIn = false;

// Check if already logged in
window.onload = () => {
    const token = localStorage.getItem('adminToken');
    if (token) {
        verifyAdminToken(token);
    }
};

async function verifyAdminToken(token) {
    try {
        // In a real app, you'd verify with your backend
        // For simplicity, we'll just check if token exists
        if (token === 'admin_logged_in') {
            adminLoggedIn = true;
            showDashboard();
            loadAllImages();
        }
    } catch (error) {
        console.error('Token verification failed:', error);
        localStorage.removeItem('adminToken');
    }
}

async function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('loginError');

    // Clear previous error
    errorDiv.textContent = '';

    if (!username || !password) {
        errorDiv.textContent = 'Please enter both username and password';
        return;
    }

    try {
        // In a real app, you'd have a secure backend for authentication
        // For this demo, we'll do a simple check
        // NEVER do this in production - use proper authentication
        
        // For demo purposes only:
        if (username === 'admin' && password === 'thisisapassword52') {
            // Success - store token (insecure for demo only)
            localStorage.setItem('adminToken', 'admin_logged_in');
            adminLoggedIn = true;
            showDashboard();
            loadAllImages();
        } else {
            // Check in database (optional - set up the admin_users table first)
            const { data, error } = await supabase
                .from('admin_users')
                .select('*')
                .eq('username', username)
                .single();

            if (error || !data) {
                errorDiv.textContent = 'Invalid username or password';
                return;
            }
        }
    } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = 'Login failed. Please try again.';
    }
}

function showDashboard() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
}

function logout() {
    localStorage.removeItem('adminToken');
    adminLoggedIn = false;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
}

async function loadAllImages() {
    if (!adminLoggedIn) return;

    try {
        // Load pending images
        const { data: pendingData, error: pendingError } = await supabase
            .from('profile_pictures')
            .select('*')
            .eq('verified', false)
            .order('created_at', { ascending: true });

        if (pendingError) throw pendingError;

        // Load verified images
        const { data: verifiedData, error: verifiedError } = await supabase
            .from('profile_pictures')
            .select('*')
            .eq('verified', true)
            .order('created_at', { ascending: false });

        if (verifiedError) throw verifiedError;

        // Update stats
        document.getElementById('pendingCount').textContent = pendingData.length;
        document.getElementById('verifiedCount').textContent = verifiedData.length;
        document.getElementById('totalCount').textContent = pendingData.length + verifiedData.length;

        // Display pending images
        displayPendingImages(pendingData);
        
        // Display verified images
        displayVerifiedImages(verifiedData);

    } catch (error) {
        console.error('Error loading images:', error);
        document.getElementById('pendingImages').innerHTML = 
            '<div class="empty-state">Error loading images. Please try again.</div>';
    }
}

function displayPendingImages(images) {
    const container = document.getElementById('pendingImages');
    
    if (images.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i>🎉</i>
                <div>No pending images to review!</div>
            </div>
        `;
        return;
    }

    container.innerHTML = images.map(image => `
        <div class="image-card" data-id="${image.id}">
            <img src="${image.url}" alt="Image ${image.id}" 
                 onerror="this.src='data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"300\" height=\"250\" viewBox=\"0 0 300 250\"><rect width=\"100%\" height=\"100%\" fill=\"%231a1a1a\"/><text x=\"50%\" y=\"50%\" fill=\"%23666\" font-family=\"Arial\" font-size=\"14\" text-anchor=\"middle\" dy=\".3em\">Image Load Error</text></svg>';">
            <div class="image-info">
                <h3>${image.service || 'Unknown Service'}</h3>
                <div class="image-meta">
                    <span class="meta-tag service-tag">${image.service || 'N/A'}</span>
                    <span class="meta-tag">Submitted: ${new Date(image.created_at).toLocaleDateString()}</span>
                </div>
                <p style="color: #aaa; font-size: 14px; margin-bottom: 15px;">
                    Keywords: ${image.keywords || 'None'}
                </p>
                <div class="actions">
                    <button class="action-btn approve-btn" onclick="approveImage('${image.id}')">
                        ✅ Approve
                    </button>
                    <button class="action-btn reject-btn" onclick="rejectImage('${image.id}')">
                        ❌ Reject
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

function displayVerifiedImages(images) {
    const container = document.getElementById('verifiedImages');
    
    if (images.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i>📁</i>
                <div>No verified images yet.</div>
            </div>
        `;
        return;
    }

    container.innerHTML = images.map(image => `
        <div class="image-card">
            <img src="${image.url}" alt="Image ${image.id}"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"300\" height=\"250\" viewBox=\"0 0 300 250\"><rect width=\"100%\" height=\"100%\" fill=\"%231a1a1a\"/><text x=\"50%\" y=\"50%\" fill=\"%23666\" font-family=\"Arial\" font-size=\"14\" text-anchor=\"middle\" dy=\".3em\">Image Load Error</text></svg>';">
            <div class="image-info">
                <h3>${image.service || 'Unknown Service'}</h3>
                <div class="image-meta">
                    <span class="meta-tag" style="background: #4CAF50;">✓ Verified</span>
                    <span class="meta-tag service-tag">${image.service || 'N/A'}</span>
                    <span class="meta-tag">Rating: ${image.rating || 0}/5</span>
                </div>
                <p style="color: #aaa; font-size: 14px; margin-bottom: 15px;">
                    Keywords: ${image.keywords || 'None'}
                </p>
                <p style="color: #888; font-size: 12px;">
                    Verified on: ${new Date(image.created_at).toLocaleDateString()}
                </p>
                <div class="actions">
                    <button class="action-btn reject-btn" onclick="deleteImage('${image.id}')" style="background: #666;">
                        🗑️ Delete
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

async function approveImage(imageId) {
    if (!confirm('Approve this image?')) return;

    try {
        const { error } = await supabase
            .from('profile_pictures')
            .update({ verified: true })
            .eq('id', imageId);

        if (error) throw error;

        alert('Image approved!');
        loadAllImages(); // Refresh the list
    } catch (error) {
        console.error('Error approving image:', error);
        alert('Failed to approve image. Please try again.');
    }
}

async function rejectImage(imageId) {
    if (!confirm('Reject this image? This will delete it permanently.')) return;

    try {
        const { error } = await supabase
            .from('profile_pictures')
            .delete()
            .eq('id', imageId);

        if (error) throw error;

        alert('Image rejected and deleted.');
        loadAllImages(); // Refresh the list
    } catch (error) {
        console.error('Error rejecting image:', error);
        alert('Failed to reject image. Please try again.');
    }
}

async function deleteImage(imageId) {
    if (!confirm('Delete this verified image?')) return;

    try {
        const { error } = await supabase
            .from('profile_pictures')
            .delete()
            .eq('id', imageId);

        if (error) throw error;

        alert('Image deleted.');
        loadAllImages(); // Refresh the list
    } catch (error) {
        console.error('Error deleting image:', error);
        alert('Failed to delete image. Please try again.');
    }
}
</script>
</body>
</html>
