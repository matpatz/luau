<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile Pictures</title>
<style>
    body {
        margin: 0;
        background: #0f0f0f;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    header {
        width: 100%;
        padding: 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        background: #111;
        position: sticky;
        top: 0;
        z-index: 10;
    }

    #search {
        padding: 6px 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
        width: 160px;
    }

    button {
        padding: 7px 14px;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
    }

    button:hover {
        background: #333;
    }

    #imageGrid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
        padding: 20px;
        max-width: 100vw;
        overflow-x: hidden;
        box-sizing: border-box;
    }

    .imgBox {
        background: #1b1b1b;
        padding: 12px;
        border-radius: 14px;
        width: 220px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .imgBox img {
        width: 100%;
        border-radius: 12px;
    }

    .rating {
        display: flex;
        gap: 6px;
        align-self: flex-end;
    }

    .rating span {
        cursor: pointer;
        font-size: 20px;
    }

    .downloadBtn {
        width: 100%;
        padding: 6px 0;
        text-align: center;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
    }

    #requestContainer {
        display: flex;
        gap: 10px;
        justify-content: flex-start;
        align-items: center;
        margin-top: 10px;
    }

    #categorySelect {
        padding: 6px 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
    }
</style>
</head>

<body>
<header>
    <input id="search" placeholder="Search..." />
    <button id="formatBtn">Format Image</button>
    <button id="fileUploadBtn">Upload / Request</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none;" />
</header>

<div id="requestContainer" style="display:none;">
    <select id="categorySelect">
        <option value="">Select Category</option>
        <option value="Discord">Discord</option>
        <option value="YouTube">YouTube</option>
        <option value="TikTok">TikTok</option>
        <option value="Other">Other</option>
    </select>
    <button id="submitRequestBtn">Submit</button>
</div>

<div id="imageGrid"></div>

<script>
let pendingUploads = [];
let publicImages = [];
let tempImage = null;

// Load saved public images (max 1000) from localStorage
window.onload = () => {
    const saved = localStorage.getItem("publicImages");
    if (saved) publicImages = JSON.parse(saved).slice(0,1000);
    renderImages();
};

const searchBox = document.getElementById('search');
searchBox.addEventListener('input', renderImages);

const fileInput = document.getElementById('fileInput');
const fileUploadBtn = document.getElementById('fileUploadBtn');
const formatBtn = document.getElementById('formatBtn');
const requestContainer = document.getElementById('requestContainer');
const categorySelect = document.getElementById('categorySelect');
const submitRequestBtn = document.getElementById('submitRequestBtn');

// File selection
fileUploadBtn.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
        tempImage = reader.result;
        requestContainer.style.display = 'flex';
        alert("Image loaded. Select category and submit.");
    };
    reader.readAsDataURL(file);
};

// Format button (no upload)
formatBtn.onclick = () => {
    if (!tempImage) return alert("Upload an image first.");
    const img = new Image();
    img.src = tempImage;
    img.onload = () => {
        const canvas = document.createElement('canvas');
        const size = Math.min(img.width, img.height);
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 512, 512);
        const a = document.createElement('a');
        a.href = canvas.toDataURL("image/png");
        a.download = "formatted_discord_pfp.png";
        a.click();
    };
};

// Submit request
submitRequestBtn.onclick = () => {
    if (!tempImage) return alert("Upload an image first.");
    if (!categorySelect.value) return alert("Select a category.");

    pendingUploads.push({ src: tempImage, rating: 0, category: categorySelect.value });
    alert("Request submitted. Pending human verification.");
    tempImage = null;
    requestContainer.style.display = 'none';
    categorySelect.value = '';
    renderImages();
};

// Render images
function renderImages() {
    const grid = document.getElementById('imageGrid');
    grid.innerHTML = '';
    const query = searchBox.value.toLowerCase();
    const allImages = [...publicImages, ...pendingUploads];

    allImages.filter(img => img.category?.toLowerCase().includes(query)).forEach((img) => {
        const box = document.createElement('div');
        box.className = 'imgBox';

        const image = document.createElement('img');
        image.src = img.src;

        const rating = document.createElement('div');
        rating.className = 'rating';
        for (let i = 1; i <= 5; i++) {
            const star = document.createElement('span');
            star.textContent = i <= img.rating ? '★' : '☆';
            star.onclick = () => {
                img.rating = i;
                localStorage.setItem("publicImages", JSON.stringify(publicImages));
                renderImages();
            };
            rating.appendChild(star);
        }

        const dl = document.createElement('button');
        dl.className = 'downloadBtn';
        dl.textContent = "Download";
        dl.onclick = () => {
            const a = document.createElement('a');
            a.href = img.src;
            a.download = "profile.png";
            a.click();
        };

        box.appendChild(image);
        box.appendChild(rating);
        box.appendChild(dl);
        grid.appendChild(box);
    });
}
</script>
</body>
</html>
