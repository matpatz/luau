<div class="input-section">
  <input type="text" id="killcodeInput" placeholder="Enter player killcode">
  <button id="selectPlayer">Select Player</button>
</div>

<div class="input-section">
  <textarea id="luaInput" placeholder="Enter Lua code here"></textarea>
  <button id="sendLuaBtn">Send Lua</button>
</div>

<div id="playerList"></div>
<div id="commandLog"></div>

<script>
const API_URL = "https://website-iota-ivory-12.vercel.app/api/send";
let selectedPlayer = null;

function addLogEntry(msg, type='system'){
  const ts = new Date().toLocaleTimeString();
  const log = document.getElementById('commandLog');
  const div = document.createElement('div');
  div.innerHTML = `[${ts}] ${type.toUpperCase()}: ${msg}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function updatePlayerList(){
  const list = document.getElementById('playerList');
  list.innerHTML = 'Loading...';
  try {
    const res = await fetch(API_URL);
    const players = await res.json();
    list.innerHTML = '';
    if(!Array.isArray(players) || players.length===0){
      list.innerHTML = 'No players connected';
      return;
    }
    players.forEach(p => {
      const item = document.createElement('div');
      item.textContent = `${p.player} (${p.killcode})`;
      item.addEventListener('click', ()=>{
        selectedPlayer = p;
        document.getElementById('killcodeInput').value = p.killcode;
        addLogEntry(`Selected player: ${p.player}`, 'success');
      });
      list.appendChild(item);
    });
  } catch(e){
    list.innerHTML = 'Error fetching players';
    addLogEntry('Error: '+e.message,'error');
  }
}

document.getElementById('selectPlayer').addEventListener('click', ()=>{
  const killcode = document.getElementById('killcodeInput').value.trim();
  if(!killcode) return addLogEntry('Enter killcode','error');
  selectedPlayer = { killcode }; // simple select
  addLogEntry(`Selected killcode: ${killcode}`,'success');
});

document.getElementById('sendLuaBtn').addEventListener('click', async ()=>{
  if(!selectedPlayer) return addLogEntry('Select a player first','error');
  const lua = document.getElementById('luaInput').value.trim();
  if(!lua) return addLogEntry('Enter Lua code','error');
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ killcode: selectedPlayer.killcode, lua })
    });
    const data = await res.json();
    if(data.success) addLogEntry(`Lua sent to ${selectedPlayer.killcode}`,'success');
    else addLogEntry('Error sending Lua: '+JSON.stringify(data),'error');
  } catch(e){
    addLogEntry('Error: '+e.message,'error');
  }
});

// auto-refresh
updatePlayerList();
setInterval(updatePlayerList,5000);
</script>
