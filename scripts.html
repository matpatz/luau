<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripts</title>
<style>
  body { background:#0f0f0f; color:#eee; font-family:sans-serif; margin:0; padding:0; }
  header { background:#111; padding:1rem; text-align:center; font-size:1.5rem; font-weight:bold; }
  main { display:flex; flex-wrap:wrap; padding:2rem; }
  .content { flex: 1 1 700px; }
  .ads-side { width:300px; margin-left:1rem; display:flex; flex-direction:column; gap:1rem; }
  .script-card { background:#222; padding:1rem; border-radius:6px; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
  pre { background:#111; padding:0.5rem; border-radius:4px; overflow-x:auto; flex:1; margin-right:1rem; min-width:250px; }
  .btn { background:#333; color:#eee; border:none; padding:0.5rem 1rem; border-radius:5px; cursor:pointer; margin-top:0.5rem; }
  .btn:hover { background:#555; }
  .status { padding:0.2rem 0.5rem; border-radius:4px; font-size:0.8rem; font-weight:bold; margin-left:0.5rem; }
  .NEW { background:#007bff; color:#fff; }
  .UPDATED { background:#28a745; color:#fff; }
  .PREMIUM { background:#dc3545; color:#fff; }
  .POPULAR { background:#fd7e14; color:#fff; }
  .ads { background:#333; padding:1rem; border-radius:6px; text-align:center; color:#fff; font-size:0.9rem; }
  footer { margin-top:2rem; background:#111; padding:1rem; text-align:center; }
  @media(max-width:1000px){
    main { flex-direction:column; }
    .ads-side { width:100%; margin-left:0; flex-direction:row; flex-wrap:wrap; gap:1rem; }
    .ads-side .ads { flex:1 1 calc(50% - 0.5rem); }
  }
</style>
</head>
<body>
<header>Extra Scripts Hub</header>
<main>
  <div class="content">
    <h1>Available Scripts</h1>
    <div id="scriptsContainer">Loading scripts...</div>
  </div>

  <div class="ads-side">
    <div class="ads">Top Ad Banner</div>
    <div class="ads">Side Ad #1</div>
    <div class="ads">Side Ad #2</div>
    <div class="ads">Side Ad #3</div>
  </div>
</main>

<footer>
  <div class="ads">Bottom Banner Ad</div>
</footer>

<script>
const scripts = [
  {
    name: "Adopt Me",
    loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/VoltexHub/ExtraScripts/main/adoptme.lua"))()',
    status: "UPDATED"
  },
  {
    name: "Blox Fruits",
    loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/VoltexHub/ExtraScripts/main/bloxfruits.lua"))()',
    status: "POPULAR"
  },
  {
    name: "Arsenal",
    loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/VoltexHub/ExtraScripts/main/arsenal.lua"))()',
    status: "PREMIUM"
  }
];

const container = document.getElementById('scriptsContainer');
container.innerHTML = '';

scripts.forEach(script => {
  const card = document.createElement('div');
  card.className = 'script-card';
  card.innerHTML = `
    <div style="flex:1; min-width:250px;">
      <h3>${script.name} <span class="status ${script.status}">${script.status}</span></h3>
      <pre>${script.loadstring}</pre>
    </div>
    <button class="btn copyBtn">Copy</button>
  `;
  container.appendChild(card);

  card.querySelector('.copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(script.loadstring).then(() => {
      card.querySelector('.copyBtn').innerText = 'Copied!';
      setTimeout(() => card.querySelector('.copyBtn').innerText = 'Copy', 1500);
    });
  });
});
</script>
</body>
</html>
