<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripts</title>
<style>
  body { background:#0f0f0f; color:#eee; font-family:sans-serif; padding:2rem; }
  h1 { text-align:center; margin-bottom:2rem; }
  .script-card { background:#222; padding:1rem; border-radius:6px; margin-bottom:1rem; display:flex; justify-content:space-between; flex-wrap:wrap; }
  pre { background:#111; padding:0.5rem; border-radius:4px; overflow-x:auto; }
  .btn { background:#333; color:#eee; border:none; padding:0.5rem 1rem; border-radius:5px; cursor:pointer; margin-top:0.5rem; }
  .btn:hover { background:#555; }
  .flex { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; }
  .status { padding:0.2rem 0.5rem; border-radius:4px; font-size:0.8rem; font-weight:bold; margin-left:0.5rem; }
  .NEW { background:#007bff; color:#fff; }
  .UPDATED { background:#28a745; color:#fff; }
  .PREMIUM { background:#dc3545; color:#fff; }
  .POPULAR { background:#fd7e14; color:#fff; }
</style>
</head>
<body>
<h1>Available Scripts</h1>
<div id="scriptsContainer">Loading scripts...</div>

<script>
const scripts = [
  {
    name: "Adopt Me",
    loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/VoltexHub/ExtraScripts/main/adoptme.lua"))()',
    features: "Auto farm, Pet duplication, Trading enhancements",
    status: "UPDATED"
  },
  {
    name: "Blox Fruits",
    loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/VoltexHub/ExtraScripts/main/bloxfruits.lua"))()',
    features: "Auto farm, Devil fruit finder",
    status: "POPULAR"
  },
  {
    name: "Arsenal",
    loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/VoltexHub/ExtraScripts/main/arsenal.lua"))()',
    features: "Aimbot, ESP, Weapon mods",
    status: "PREMIUM"
  }
];

const container = document.getElementById('scriptsContainer');
container.innerHTML = '';

scripts.forEach(script => {
  const card = document.createElement('div');
  card.className = 'script-card';
  card.innerHTML = `
    <div>
      <h3>${script.name} <span class="status ${script.status}">${script.status}</span></h3>
      <p><strong>Quick Features:</strong> ${script.features}</p>
      <pre>${script.loadstring}</pre>
    </div>
    <div class="flex" style="flex-direction:column;">
      <button class="btn copyBtn">Copy Loadstring</button>
    </div>
  `;
  container.appendChild(card);

  card.querySelector('.copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(script.loadstring).then(() => {
      card.querySelector('.copyBtn').innerText = 'Copied!';
      setTimeout(() => card.querySelector('.copyBtn').innerText = 'Copy Loadstring', 1500);
    });
  });
});
</script>
</body>
</html>
