<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Catastrophia Dashboard</title>
  <style>
    body { background:#111; color:#eee; font-family:monospace; }
    #playerList { max-height:200px; overflow-y:auto; border:1px solid #444; margin-bottom:10px; }
    .player-item { padding:6px; border-bottom:1px solid #333; cursor:pointer; }
    .player-item:hover { background:#222; }
    #commandLog { height:200px; overflow-y:auto; border:1px solid #444; margin-top:10px; padding:4px; }
    .log-entry { margin:2px 0; }
    .system-msg{color:#ccc;} .error-msg{color:#f55;} .success-msg{color:#5f5;} .command-msg{color:#7cf;} .server-msg{color:#ff5;}
    #luaInput { width:80%; padding:4px; }
    #sendLuaBtn { padding:4px 8px; margin-left:6px; }
  </style>
</head>
<body>
  <h2>Catastrophia Dashboard</h2>
  <div id="playerList"></div>
  <input type="text" id="killcodeInput" placeholder="Killcode">
  <button id="selectPlayer">Select Player</button>
  <br><br>
  <input type="text" id="luaInput" placeholder="Enter Lua code here">
  <button id="sendLuaBtn">Send Lua</button>
  <div id="commandLog"></div>

  <script>
    const killcodeInput = document.getElementById('killcodeInput');
    const selectPlayerBtn = document.getElementById('selectPlayer');
    const luaInput = document.getElementById('luaInput');
    const sendLuaBtn = document.getElementById('sendLuaBtn');
    const commandLog = document.getElementById('commandLog');
    const playerList = document.getElementById('playerList');
    let selectedPlayer = null;

    const API_URL = "https://website-iota-ivory-12.vercel.app/api/send";

    function addLogEntry(msg, type='system'){
      const ts = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      let prefix='[System]', cls='system-msg';
      if(type==='error'){ prefix='[Error]'; cls='error-msg'; }
      else if(type==='success'){ prefix='[Success]'; cls='success-msg'; }
      else if(type==='command'){ prefix='[Command]'; cls='command-msg'; }
      else if(type==='server'){ prefix='[Server]'; cls='server-msg'; }
      entry.innerHTML = `<span class="timestamp">[${ts}] ${prefix}</span> <span class="${cls}">${msg}</span>`;
      commandLog.appendChild(entry);
      commandLog.scrollTop = commandLog.scrollHeight;
    }

    async function updatePlayerList(){
      playerList.innerHTML = '<div class="player-item">Loading...</div>';
      try {
        const res = await fetch(API_URL);
        const players = await res.json();

        playerList.innerHTML = '';
        if(players.length === 0){
          playerList.innerHTML = '<div class="player-item">No players connected</div>';
          return;
        }

        players.forEach(player => {
          const item = document.createElement('div');
          item.className = 'player-item';
          item.innerHTML = `
            <div class="player-info">
              <span class="player-name">${player.player}</span>
              <span class="player-id">ID: ${player.userid}</span>
            </div>
            <span class="player-killcode">${player.killcode}</span>
          `;
          item.addEventListener('click', () => {
            selectedPlayer = player;
            killcodeInput.value = player.killcode;
            addLogEntry(`Selected player: ${player.player} (${player.killcode})`, 'success');
          });
          playerList.appendChild(item);
        });

      } catch(e){
        playerList.innerHTML = '<div class="player-item">Error loading players</div>';
        addLogEntry('Failed to fetch players: ' + e.message, 'error');
      }
    }

    async function sendLuaToPlayer(killcode, code){
      try {
        const res = await fetch(API_URL, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ killcode, type:"lua", value: code })
        });
        if(res.ok){
          addLogEntry(`Sent Lua to ${killcode}: ${code}`, 'command');
        } else {
          addLogEntry(`Failed to send Lua (${res.status})`, 'error');
        }
      } catch(e){
        addLogEntry(`Error sending Lua: ${e.message}`, 'error');
      }
    }

    selectPlayerBtn.addEventListener('click', ()=>{
      const k = killcodeInput.value.trim();
      if(k) addLogEntry(`Selected killcode manually: ${k}`, 'system');
      else addLogEntry('Please enter a killcode', 'error');
    });

    sendLuaBtn.addEventListener('click', ()=>{
      const code = luaInput.value.trim();
      if(!selectedPlayer){ addLogEntry('No player selected', 'error'); return; }
      if(!code){ addLogEntry('No Lua code entered', 'error'); return; }
      sendLuaToPlayer(selectedPlayer.killcode, code);
      luaInput.value='';
    });

    updatePlayerList();
    setInterval(updatePlayerList, 5000);
    addLogEntry('Dashboard ready. Waiting for player connections...', 'system');
  </script>
</body>
</html>
