<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lua Obfuscator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.container{width:100%;max-width:700px;padding:20px;}
.title{text-align:center;font-size:28px;margin-bottom:20px;color:#00eeff;text-shadow:0 0 10px rgba(0,238,255,0.5);}
.panel{display:flex;flex-direction:column;gap:15px;}
.textarea-field{padding:12px;border-radius:6px;border:2px solid #39396b;background:rgba(30,30,60,0.8);color:#fff;font-size:14px;font-family:monospace;width:100%;min-height:200px;resize:vertical;}
.enter-btn{padding:12px;border-radius:6px;border:none;background:linear-gradient(135deg,#00c6ff,#0072ff);color:white;font-weight:bold;cursor:pointer;transition:all 0.3s;}
.enter-btn:hover{background:linear-gradient(135deg,#00eeff,#008cff);transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,238,255,0.4);}
.inline-msg{margin-top:5px;font-size:14px;}
.inline-msg.success{color:#55ff55;}
.inline-msg.error{color:#ff5555;}
</style>
</head>
<body>
<div class="container">
<h1 class="title">Lua Obfuscator</h1>

<div class="panel">
  <textarea class="textarea-field" id="inputScript" placeholder="Paste your Lua script here..."></textarea>
  <button class="enter-btn" id="obfuscateBtn">Obfuscate</button>
  <div id="feedback" class="inline-msg"></div>
  <textarea class="textarea-field" id="outputScript" placeholder="Obfuscated script will appear here..." readonly></textarea>
</div>

</div>

<script>
const inputScript = document.getElementById('inputScript');
const outputScript = document.getElementById('outputScript');
const obfuscateBtn = document.getElementById('obfuscateBtn');
const feedback = document.getElementById('feedback');

function showFeedback(msg,type='success'){
  feedback.textContent = msg;
  feedback.className = 'inline-msg ' + (type==='success'?'success':'error');
}

// Generate random variable names like _v1234
function randomVar(){ return "_v" + Math.floor(Math.random()*10000); }

// Obfuscate Lua code
function obfuscateLua(lua){
  try{
    // Remove comments
    lua = lua.replace(/--\[==*\[.*?\]==*\]/gs,""); // multiline
    lua = lua.replace(/--.*$/gm,""); // single-line

    // Remove extra whitespace
    lua = lua.replace(/\s+/g," ").trim();

    // Collect all identifiers (variables/functions)
    const identifiers = {};
    let index = 0;
    lua = lua.replace(/\b(local\s+)?([a-zA-Z_][a-zA-Z0-9_]*)\b/g,(m,localKeyword,name)=>{
      if(["function","end","if","then","else","for","in","do","while","repeat","until","return","break","true","false","nil"].includes(name)) return m;
      if(!identifiers[name]) identifiers[name] = randomVar();
      return (localKeyword||"") + identifiers[name];
    });

    return lua;
  }catch(e){
    showFeedback("Obfuscation failed", "error");
    return "";
  }
}

obfuscateBtn.addEventListener('click', ()=>{
  const script = inputScript.value.trim();
  if(!script){
    showFeedback("Paste a Lua script first","error");
    outputScript.value = "";
    return;
  }
  const obf = obfuscateLua(script);
  outputScript.value = obf;
  showFeedback("Obfuscation complete","success");
});
</script>
</body>
</html>
