<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catastrophia Dashboard</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e1e;
            color: #fff;
        }
        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }
        header {
            background-color: #333;
            padding: 10px;
            text-align: center;
            font-size: 1.5rem;
        }
        .main-content {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
        }
        .sidebar {
            width: 250px;
            background-color: #2c2c2c;
            padding: 10px;
            border-radius: 8px;
        }
        .sidebar h3 {
            margin-top: 0;
        }
        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }
        .sidebar li {
            margin: 10px 0;
        }
        .sidebar button {
            width: 100%;
            padding: 8px;
            background-color: #444;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
        }
        .sidebar button:hover {
            background-color: #555;
        }
        .main-panel {
            flex: 1;
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 8px;
            overflow-y: auto;
        }
        .main-panel h3 {
            margin-top: 0;
        }
        .log {
            background-color: #333;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
        }
        .broadcast {
            margin-top: 20px;
        }
        .broadcast input {
            width: calc(100% - 100px);
            padding: 8px;
            border: none;
            border-radius: 5px;
        }
        .broadcast button {
            width: 80px;
            padding: 8px;
            background-color: #444;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
        }
        .broadcast button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        Catastrophia Dashboard
    </header>

    <div class="main-content">
        <div class="sidebar">
            <h3>Command Control</h3>
            <label for="player-select">Select Player</label>
            <select id="player-select">
                <option value="player1">Player 1</option>
                <option value="player2">Player 2</option>
                <option value="player3">Player 3</option>
            </select>
            <h3>Available Commands</h3>
            <ul>
                <li><button onclick="sendCommand('reset')">Reset</button></li>
                <li><button onclick="sendCommand('lag')">Lag</button></li>
                <li><button onclick="sendCommand('deleteBackpack')">Delete Backpack</button></li>
                <li><button onclick="sendCommand('leave')">Leave</button></li>
                <li><button onclick="sendCommand('crash')">Crash</button></li>
                <li><button onclick="sendCommand('console')">Console</button></li>
                <li><button onclick="sendCommand('rConsole')">RConsole</button></li>
                <li><button onclick="sendCommand('clientBan')">Client Ban</button></li>
                <li><button onclick="sendCommand('remoteBan')">Remote Ban</button></li>
            </ul>
        </div>

        <div class="main-panel">
            <h3>Connected Players</h3>
            <div id="connected-players">
                <!-- Connected players will be listed here -->
            </div>

            <div class="broadcast">
                <input type="text" id="broadcast-input" placeholder="Enter message to broadcast">
                <button onclick="broadcastMessage()">Send</button>
            </div>

            <div class="log" id="server-log">
                [System] Dashboard initialized
            </div>
        </div>
    </div>
</div>

<script>
    const serverLog = document.getElementById('server-log');
    const connectedPlayersDiv = document.getElementById('connected-players');
    const playerSelect = document.getElementById('player-select');
    const broadcastInput = document.getElementById('broadcast-input');

    const commands = {
        reset: 'Resetting player...',
        lag: 'Applying lag...',
        deleteBackpack: 'Deleting backpack...',
        leave: 'Player leaving...',
        crash: 'Crashing player...',
        console: 'Opening console...',
        rConsole: 'Opening remote console...',
        clientBan: 'Banning client...',
        remoteBan: 'Banning remotely...'
    };

    const connectedPlayers = ['Player 1', 'Player 2', 'Player 3'];

    function updateConnectedPlayers() {
        connectedPlayersDiv.innerHTML = connectedPlayers.map(player => `<p>${player}</p>`).join('');
    }

    function sendCommand(command) {
        const player = playerSelect.value;
        const commandMessage = `${commands[command]} Target: ${player}`;
        logToServer(commandMessage);
    }

    function broadcastMessage() {
        const message = broadcastInput.value;
        if (message) {
            logToServer(`Broadcast: ${message}`);
            broadcastInput.value = '';
        }
    }

    function logToServer(message) {
        const timestamp = new Date().toLocaleTimeString();
        serverLog.textContent = `[${timestamp}] ${message}\n` + serverLog.textContent;
    }

    updateConnectedPlayers();
</script>

</body>
</html>
