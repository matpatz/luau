<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Site</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ———————————————— YOUR ORIGINAL CSS (UNCUT, UNCHANGED) ———————————————— */
body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
}
header {
    padding: 15px;
    background: #222;
}
.container {
    width: 95%;
    max-width: 900px;
    margin: 0 auto;
}
.button {
    background: #444;
    padding: 8px 14px;
    border-radius: 5px;
    display: inline-block;
    cursor: pointer;
}
#uploadSection {
    margin-top: 20px;
}
input, select {
    background: #222;
    color: #fff;
    border: 1px solid #333;
    padding: 6px;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-top: 20px;
}
.item {
    background: #222;
    padding: 8px;
    border-radius: 5px;
    text-align: center;
}
.video-preview, .image-preview {
    width: 100%;
    border-radius: 5px;
}
.service-tag {
        display: inline-block;
        background: #333;
        padding: 2px 12px;
        border-radius: 4px;
        font-size: 11px;
        color: #ccc;
        margin-top: 10px;
    }
</style>
</head>

<body>

<header>
<div class="container">
    <span class="button" onclick="openEmailModal()">Verify Email</span>
    <span class="button" onclick="logout()">Logout</span>
</div>
</header>

<div class="container">

    <!-- Upload Section -->
    <div id="uploadSection">
        <h2>Upload</h2>

        <!-- File input -->
        <input type="file" id="uploadFile"><br><br>

        <!-- Public / Private toggle (ADDED) -->
        <label>Visibility:</label>
        <select id="publicSelect">
            <option value="true">Public</option>
            <option value="false">Private</option>
        </select>
        <br><br>

        <span class="button" onclick="uploadContent()">Upload</span>
    </div>

    <!-- Content Grid -->
    <div id="contentGrid" class="grid"></div>
</div>

<!-- EMAIL VERIFICATION MODAL (ADDED – ZERO STYLE CHANGES) -->
<div id="emailModal" style="
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.8); display:none;
">
    <div style="background:#222; padding:20px; margin:120px auto; width:300px;">
        <h3>Email Verification</h3>
        <input id="emailInput" placeholder="Email"><br><br>
        <span class="button" onclick="sendVerificationCode()">Send Code</span><br><br>

        <input id="codeInput" placeholder="Enter Code"><br><br>
        <span class="button" onclick="verifyCode()">Verify</span><br><br>

        <span class="button" onclick="closeEmailModal()">Close</span>
    </div>
</div>

<script>
/* —————————————————— SUPABASE INIT —————————————————— */
const supabaseUrl = 'https://erctbeaqvqxjsrdjzonw.supabase.co';
const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyY3RiZWFxdnF4anNyZGp6b253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MzE2OTgsImV4cCI6MjA4MDIwNzY5OH0.Yal4o1NDY7p5W822mX7kaigTpPakTyygKLlp67ic6Kg';

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* —————————————————— GLOBAL STATE —————————————————— */
let currentUser = null;
let emailVerificationCode = null;

/* —————————————————— AUTH —————————————————— */

async function openEmailModal() {
    document.getElementById("emailModal").style.display = "block";
}
function closeEmailModal() {
    document.getElementById("emailModal").style.display = "none";
}

function logout() {
    localStorage.removeItem("user_id");
    location.reload();
}

async function sendVerificationCode() {
    const email = document.getElementById("emailInput").value.trim();
    if (!email) return alert("Enter email.");

    emailVerificationCode = Math.floor(100000 + Math.random() * 900000).toString();

    // Save code to DB
    await supabase.from("users").upsert({
        email: email,
        verify_code: emailVerificationCode,
        verified: false
    });

    alert("Verification code sent (simulated). Code = " + emailVerificationCode);
}

async function verifyCode() {
    const email = document.getElementById("emailInput").value.trim();
    const code = document.getElementById("codeInput").value.trim();

    const { data } = await supabase
        .from("users")
        .select("*")
        .eq("email", email)
        .single();

    if (!data) return alert("Email not found.");
    if (data.verify_code !== code) return alert("Wrong code.");

    await supabase
        .from("users")
        .update({ verified: true })
        .eq("email", email);

    alert("Email verified! Video upload unlocked.");

    localStorage.setItem("user_id", data.id);
    currentUser = data;

    closeEmailModal();
    loadContent();
}

/* —————————————————— LOAD USER FROM LOCALSTORAGE —————————————————— */
async function loadUser() {
    const uid = localStorage.getItem("user_id");
    if (!uid) return;

    const { data } = await supabase.from("users").select("*").eq("id", uid).single();
    currentUser = data || null;
}

/* —————————————————— UPLOAD LOGIC —————————————————— */
async function uploadContent() {
    if (!currentUser) return alert("Verify email first.");

    const file = document.getElementById("uploadFile").files[0];
    if (!file) return alert("Select a file.");

    const isVideo = file.type.startsWith("video");
    if (isVideo && !currentUser.verified) {
        return alert("Email verification required to upload videos.");
    }

    const visibility = document.getElementById("publicSelect").value === "true";

    const filename = `${currentUser.id}_${Date.now()}_${file.name}`;

    const { error: uploadErr } = await supabase.storage
        .from("content")
        .upload(filename, file);

    if (uploadErr) return alert("Upload failed: " + uploadErr.message);

    const publicUrl = supabase.storage
        .from("content")
        .getPublicUrl(filename).data.publicUrl;

    await supabase.from("posts").insert({
        user_id: currentUser.id,
        url: publicUrl,
        filename: filename,
        is_public: visibility,
        type: isVideo ? "video" : "image"
    });

    alert("Uploaded!");
    loadContent();
}

/* —————————————————— CONTENT LOADING —————————————————— */
async function loadContent() {
    const { data: posts } = await supabase.from("posts").select("*");

    const grid = document.getElementById("contentGrid");
    grid.innerHTML = "";

    posts.forEach(post => {
        if (!post.is_public && post.user_id !== currentUser?.id) return;

        const div = document.createElement("div");
        div.className = "item";

        if (post.type === "video") {
            div.innerHTML = `
                <video class="video-preview" controls>
                    <source src="${post.url}">
                </video>
                <br>
                <span class="button" onclick="copyLink('${post.url}')">Share</span>
            `;
        } else {
            div.innerHTML = `
                <img class="image-preview" src="${post.url}">
                <br>
                <span class="button" onclick="copyLink('${post.url}')">Share</span>
            `;
        }

        grid.appendChild(div);
    });
}

function copyLink(url) {
    navigator.clipboard.writeText(url);
    alert("Copied!");
}

/* —————————————————— INIT —————————————————— */
loadUser().then(loadContent);
</script>

</body>
</html>
