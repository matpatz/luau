<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Image Upload Site</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
/* ======================= */
/* KEEP ALL YOUR ORIGINAL CSS EXACT */
/* ======================= */
body {
    margin: 0;
    background: #0f0f0f;
    color: #fff;
    font-family: Arial, sans-serif;
}

header {
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    position: sticky;
    top: 0;
    z-index: 10;
    padding-right: 40px;
}

.header-left {
    display: flex;
    gap: 15px;
    align-items: center;
}

.admin-link {
    color: #4CAF50;
    text-decoration: none;
    font-size: 14px;
    margin-left: 20px;
}

.admin-link:hover {
    text-decoration: underline;
}

#search {
    padding: 6px 10px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    width: 160px;
}

button {
    padding: 7px 14px;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    cursor: pointer;
    color: #fff;
}

button:hover {
    background: #333;
}

#imageGrid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 20px;
    max-width: 100vw;
    overflow-x: hidden;
    box-sizing: border-box;
}

.imgBox {
    background: #1b1b1b;
    padding: 12px;
    border-radius: 14px;
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
}

.imgBox img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.keywords-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
}

.keywords-label {
    color: #888;
    font-size: 12px;
    white-space: nowrap;
}

.keywords-text {
    color: #ccc;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-grow: 1;
}

.bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 5px;
}

.rating {
    display: flex;
    gap: 4px;
    align-items: center;
}

.rating span {
    cursor: pointer;
    font-size: 18px;
}

.status-badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
}

.pending-badge {
    background: #ff9800;
    color: #000;
}

.verified-badge {
    background: #4CAF50;
    color: #000;
}

.downloadBtn {
    width: 100%;
    padding: 6px 0;
    text-align: center;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    cursor: pointer;
    color: #fff;
    margin-top: 8px;
}

.service-tag {
    display: inline-block;
    background: #333;
    padding: 2px 12px;
    border-radius: 4px;
    font-size: 11px;
    color: #ccc;
    margin-top: 0px;
}
</style>
</head>
<body>
<header>
    <div class="header-left">
        <input id="search" placeholder="Search..." />
        <button id="formatBtn">Format Image</button>
        <button id="uploadBtn">Upload</button>
        <a href="tulip.html" class="admin-link">tulip</a>
        <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;" />
    </div>
</header>

<div id="imageGrid"></div>

<script>
// ================= SUPABASE =================
const supabaseUrl = 'https://erctbeaqvqxjsrdjzonw.supabase.co';
const supabaseKey = 'YOUR_SUPABASE_KEY';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// ================= GLOBALS =================
let posts = [];
let userVerified = false;
const CACHE_DURATION = 30000;
let lastFetchTime = 0;

// ================= CHECK AUTH =================
async function checkAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    userVerified = !!session?.user;
}

checkAuth();

// ================= LOAD POSTS =================
async function loadPosts() {
    const now = Date.now();
    if(posts.length && now - lastFetchTime < CACHE_DURATION){
        renderPosts();
        return;
    }
    const { data, error } = await supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(100);

    if(error){ console.error(error); return; }

    posts = data;
    lastFetchTime = now;
    renderPosts();
}

// ================= RENDER POSTS =================
function renderPosts() {
    const grid = document.getElementById('imageGrid');
    const query = document.getElementById('search').value.toLowerCase();
    grid.innerHTML = '';

    const filtered = posts.filter(p => {
        if(!p.is_public && !userVerified) return false;
        return (p.filename.toLowerCase().includes(query) || (p.type && p.type.toLowerCase().includes(query)));
    });

    if(!filtered.length){
        const e = document.createElement('div');
        e.style.textAlign='center';
        e.style.width='100%';
        e.style.padding='60px';
        e.style.color='#666';
        e.textContent='No posts found.';
        grid.appendChild(e);
        return;
    }

    filtered.forEach(p=>{
        const box = document.createElement('div');
        box.className='imgBox';

        const kwRow = document.createElement('div');
        kwRow.className='keywords-row';
        const kwLabel = document.createElement('span');
        kwLabel.className='keywords-label';
        kwLabel.textContent='Filename:';
        const kwText = document.createElement('span');
        kwText.className='keywords-text';
        kwText.textContent=p.filename || '';
        kwRow.appendChild(kwLabel);
        kwRow.appendChild(kwText);

        const media = document.createElement(p.type==='video'?'video':'img');
        media.src = p.url;
        if(p.type==='video'){ media.controls=true; media.style.height='180px'; }
        media.onerror = ()=>{ media.src=''; };

        const tag = document.createElement('div');
        tag.className='service-tag';
        tag.textContent=p.type || 'Unknown';

        const bottom = document.createElement('div');
        bottom.className='bottom-row';

        const dl = document.createElement('button');
        dl.className='downloadBtn';
        dl.textContent='Share';
        dl.onclick = ()=>{navigator.clipboard.writeText(p.url); alert('URL copied!');};

        bottom.appendChild(dl);
        box.appendChild(kwRow);
        box.appendChild(media);
        box.appendChild(tag);
        box.appendChild(bottom);

        grid.appendChild(box);
    });
}

// ================= UPLOAD =================
const fileInput = document.getElementById('fileInput');
document.getElementById('uploadBtn').onclick=()=>fileInput.click();

fileInput.onchange=async e=>{
    const f=e.target.files[0];
    if(!f)return;

    if(f.type.startsWith('video') && !userVerified){
        alert("Verify your email to upload videos.");
        return;
    }

    const name = f.name;
    const { data, error } = await supabase.storage
        .from('content')
        .upload(`${Date.now()}_${name}`, f, { upsert:true });

    if(error){ console.error(error); return; }

    const urlData = supabase.storage.from('content').getPublicUrl(data.path);
    const { error: dbErr } = await supabase.from('posts').insert([{
        url: urlData.data.publicUrl,
        filename: name,
        type: f.type.startsWith('video')?'video':'image',
        is_public:true
    }]);

    if(dbErr){ console.error(dbErr); return; }
    loadPosts();
};

// ================= SEARCH =================
document.getElementById('search').addEventListener('input', ()=>{ renderPosts(); });

// ================= AUTO REFRESH =================
setInterval(()=>{
    if(document.visibilityState==='visible') loadPosts();
}, 120000);

// ================= INIT =================
loadPosts();
</script>
</body>
</html>
