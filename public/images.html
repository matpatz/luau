<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile Pictures</title>
<style>
    body {
        margin: 0;
        background: #0f0f0f;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    header {
        width: 100%;
        padding: 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        background: #111;
        position: sticky;
        top: 0;
        z-index: 10;
    }

    #search {
        padding: 6px 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        color: #fff;
        width: 160px;
    }

    button {
        padding: 7px 14px;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
    }

    button:hover {
        background: #333;
    }

    #imageGrid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
        padding: 20px;
        max-width: 100vw;
        overflow-x: hidden;
        box-sizing: border-box;
    }

    .imgBox {
        background: #1b1b1b;
        padding: 12px;
        border-radius: 14px;
        width: 220px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .imgBox img {
        width: 100%;
        border-radius: 12px;
    }

    .rating {
        display: flex;
        gap: 6px;
        align-self: flex-end;
    }

    .rating span {
        cursor: pointer;
        font-size: 20px;
    }

    .downloadBtn {
        width: 100%;
        padding: 6px 0;
        text-align: center;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
    }

    #verifyBoxContainer {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1a1a1a;
        padding: 20px;
        border-radius: 12px;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 20;
    }

    #verifyBoxContainer img {
        max-width: 400px;
        max-height: 400px;
        border-radius: 12px;
    }

    #verifyActions {
        display: flex;
        gap: 10px;
        align-items: center;
        width: 100%;
        justify-content: flex-start;
    }

    #verifyActions input, #verifyActions select, #verifyActions button {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #222;
        color: #fff;
        cursor: pointer;
    }

    #verifyActions input {
        width: 120px;
    }
</style>
</head>

<body>
<header>
    <input id="search" placeholder="Search..." />
    <button id="formatBtn">Format Image</button>
    <button id="uploadBtn">Request Upload</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none;" />
</header>

<div id="verifyBoxContainer">
    <img id="verifyImg" src="" />
    <div id="verifyActions">
        <input type="text" id="keywordsInput" placeholder="Keywords" />
        <select id="serviceSelect">
            <option value="">Services</option>
            <option value="Discord">Discord</option>
            <option value="YouTube">YouTube</option>
            <option value="TikTok">TikTok</option>
            <option value="Other">Other</option>
        </select>
        <button id="submitVerifyBtn">Submit</button>
    </div>
</div>

<div id="imageGrid"></div>

<script>
let pendingUploads = [];
let publicImages = [];
let tempImage = null;

window.onload = () => {
    const saved = localStorage.getItem("publicImages");
    if (saved) publicImages = JSON.parse(saved).slice(0,1000);
    renderImages();
};

const searchBox = document.getElementById('search');
searchBox.addEventListener('input', renderImages);

const fileInput = document.getElementById('fileInput');
const formatBtn = document.getElementById('formatBtn');
const uploadBtn = document.getElementById('uploadBtn');
const verifyBoxContainer = document.getElementById('verifyBoxContainer');
const verifyImg = document.getElementById('verifyImg');
const keywordsInput = document.getElementById('keywordsInput');
const serviceSelect = document.getElementById('serviceSelect');
const submitVerifyBtn = document.getElementById('submitVerifyBtn');

uploadBtn.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
        tempImage = reader.result;
        verifyImg.src = tempImage;
        verifyBoxContainer.style.display = 'flex';
    };
    reader.readAsDataURL(file);
};

formatBtn.onclick = () => {
    fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            tempImage = reader.result;
            const service = prompt("Enter service to format for (Discord, YouTube, TikTok, Other):");
            if (!service) return alert("Service required.");

            const img = new Image();
            img.src = tempImage;
            img.onload = () => {
                let width = 512, height = 512;
                if(service.toLowerCase() === 'youtube') { width = 1280; height = 720; }
                else if(service.toLowerCase() === 'tiktok') { width = 1080; height = 1920; }
                // Discord default already set 512x512

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = `formatted_${service.toLowerCase()}_image.png`;
                a.click();
            };
        };
        reader.readAsDataURL(file);
    };
};

submitVerifyBtn.onclick = () => {
    if (!tempImage) return alert("No image to submit.");
    if (!serviceSelect.value) return alert("Select a service.");
    const keywords = keywordsInput.value.trim();
    if (!keywords) return alert("Enter keywords.");

    // Send tempImage, serviceSelect.value, and keywords somewhere for human verification
    pendingUploads.push({ src: tempImage, rating: 0, service: serviceSelect.value, keywords });
    alert("Upload request submitted for human verification.");
    tempImage = null;
    verifyBoxContainer.style.display = 'none';
    keywordsInput.value = '';
    serviceSelect.value = '';
    renderImages();
};

function renderImages() {
    const grid = document.getElementById('imageGrid');
    grid.innerHTML = '';
    const query = searchBox.value.toLowerCase();
    const allImages = [...publicImages, ...pendingUploads];

    allImages.filter(img => img.service?.toLowerCase().includes(query) || img.keywords?.toLowerCase().includes(query)).forEach(img => {
        const box = document.createElement('div');
        box.className = 'imgBox';

        const image = document.createElement('img');
        image.src = img.src;

        const rating = document.createElement('div');
        rating.className = 'rating';
        for (let i = 1; i <= 5; i++) {
            const star = document.createElement('span');
            star.textContent = i <= img.rating ? '★' : '☆';
            star.onclick = () => {
                img.rating = i;
                localStorage.setItem("publicImages", JSON.stringify(publicImages));
                renderImages();
            };
            rating.appendChild(star);
        }

        const dl = document.createElement('button');
        dl.className = 'downloadBtn';
        dl.textContent = "Download";
        dl.onclick = () => {
            const a = document.createElement('a');
            a.href = img.src;
            a.download = "profile.png";
            a.click();
        };

        box.appendChild(image);
        box.appendChild(rating);
        box.appendChild(dl);
        grid.appendChild(box);
    });
}
</script>
</body>
</html>
