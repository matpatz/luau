<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Catastrophia Admin</title>
<style>
  :root{
    --bg:#0f1724; --panel:#0b1220; --accent:#2563eb; --muted:#94a3b8; --text:#e6eef8;
  }
  *{box-sizing:border-box;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;}
  body{margin:0;background:linear-gradient(180deg,#071023 0%, #07162a 100%);color:var(--text);padding:18px;}
  .wrap{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start;}
  @media(max-width:900px){.wrap{grid-template-columns:1fr;}}
  .panel{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.04);padding:14px;border-radius:12px;box-shadow:0 6px 18px rgba(2,6,23,0.6);}
  h2{margin:0 0 10px;font-size:16px;letter-spacing:0.2px;color:var(--text)}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .box{min-height:140px;}
  .section{margin-bottom:12px}
  .scroll{
    height:260px;overflow:auto;padding:8px;border-radius:8px;background:rgba(255,255,255,0.01);border:1px dashed rgba(255,255,255,0.02);
  }
  .cmd-btn, .player-line, .small-btn{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;margin:6px 0;background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.02)}
  .cmd-btn button, .small-btn button{background:var(--accent);border:0;color:white;padding:6px 10px;border-radius:6px;cursor:pointer}
  .inputs{display:flex;gap:8px}
  input[type="text"], textarea{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:8px;border-radius:8px;color:var(--text);width:100%}
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
  .logline{font-family:monospace;font-size:12px;color:var(--muted);padding:6px 0;border-bottom:1px dotted rgba(255,255,255,0.02)}
  .player-meta{font-size:12px;color:var(--muted)}
  footer{margin-top:12px;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">

  <!-- LEFT: main panels -->
  <div>

    <!-- Top Row: Box1 (Commands) -->
    <div class="panel box section">
      <h2>Commands</h2>
      <div style="display:flex;gap:10px;margin-bottom:10px">
        <div style="flex:1">
          <label>TextBox -- enter killcode (target)</label>
          <input id="targetCode" type="text" placeholder="target id / code / username" />
        </div>
        <div style="width:110px;display:flex;align-items:end">
          <button id="enterTarget" style="width:100%;padding:10px;border-radius:8px;background:var(--accent);border:0;color:#fff;cursor:pointer">Enter</button>
        </div>
      </div>

      <div class="scroll" id="commandsList">
        <!-- command buttons appended here -->
      </div>
    </div>

    <!-- Box3: Server Log -->
    <div class="panel box section" style="margin-top:14px">
      <h2>Server Log</h2>
      <div class="scroll" id="serverLog">
        <!-- logs -->
      </div>
      <footer>Last sync: <span id="lastSync">never</span></footer>
    </div>

  </div>

  <!-- RIGHT: Box2 (Connect Players + Broadcast) -->
  <div>
    <div class="panel section">
      <h2>Connect Players</h2>

      <div class="scroll" id="playersList" style="height:280px">
        <!-- player lines -->
      </div>

      <div style="margin-top:10px">
        <label>TextBox — for message to display (via in-game broadcast)</label>
        <textarea id="broadcastMessage" rows="3" placeholder="Type broadcast message..."></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button id="broadcastBtn" style="flex:1;background:#10b981;border:0;padding:10px;border-radius:8px;color:white;cursor:pointer">Broadcast</button>
          <button id="refreshBtn" class="small-btn"><button style="display:none"></button></button>
        </div>
      </div>
    </div>

    <div class="panel section" style="margin-top:14px">
      <h2>Quick Actions</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button id="refreshPlayers" class="small-btn" style="padding:6px 10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03);color:var(--text)">Refresh Players</button>
        <button id="clearLogs" class="small-btn" style="padding:6px 10px">Clear Logs</button>
      </div>
    </div>

  </div>
</div>

<script>
/* ====== CONFIG ====== */
const BACKEND_BASE_URL = "http://localhost:3000"; // <--- change to your backend
const SERVER_ID = "server-1"; // identify which server instance (optional)

/* ====== UI helpers ====== */
const commands = [
  {id:"kill", label:"Kill Target"},
  {id:"kick", label:"Kick Target"},
  {id:"freeze", label:"Freeze Target"},
  {id:"heal", label:"Heal Target"},
  {id:"giveItem", label:"Give Item"},
  {id:"custom", label:"Custom Command"}
];

function log(msg){
  const container = document.getElementById("serverLog");
  const el = document.createElement("div");
  el.className = "logline";
  const time = new Date().toLocaleTimeString();
  el.textContent = `[${time}] ${msg}`;
  container.prepend(el);
}

/* ====== build commands list ====== */
const commandsList = document.getElementById("commandsList");
commands.forEach(cmd=>{
  const line = document.createElement("div");
  line.className = "cmd-btn";
  const left = document.createElement("div");
  left.innerHTML = `<strong>${cmd.label}</strong><div style="font-size:12px;color:#94a3b8">${cmd.id}</div>`;
  const btn = document.createElement("button");
  btn.textContent = "Send";
  btn.onclick = ()=>sendCommand(cmd.id);
  line.appendChild(left);
  line.appendChild(btn);
  commandsList.appendChild(line);
});

/* ====== players list fetch & render ====== */
async function fetchPlayers(){
  try{
    const res = await fetch(`${BACKEND_BASE_URL}/players`);
    const data = await res.json();
    renderPlayers(data.players||[]);
    document.getElementById("lastSync").textContent = new Date().toLocaleString();
    log("Fetched players list.");
  }catch(e){
    log("Failed to fetch players: " + e.message);
  }
}
function renderPlayers(players){
  const container = document.getElementById("playersList");
  container.innerHTML = "";
  players.forEach(p=>{
    const line = document.createElement("div");
    line.className = "player-line";
    line.style.display="flex";line.style.justifyContent="space-between";line.style.alignItems="center";
    const info = document.createElement("div");
    info.innerHTML = `<div><strong>${p.username}</strong> <span class="player-meta">(${p.userId})</span></div><div class="player-meta">killswitch: ${p.killswitch || "none"}</div>`;
    const actions = document.createElement("div");
    actions.style.display="flex";actions.style.gap="6px";
    const btnKick = document.createElement("button");
    btnKick.textContent = "Kick";
    btnKick.onclick = ()=>sendCommand("kick", {targetUserId:p.userId});
    const btnKill = document.createElement("button");
    btnKill.textContent = "Kill";
    btnKill.onclick = ()=>sendCommand("kill", {targetUserId:p.userId});
    actions.appendChild(btnKick); actions.appendChild(btnKill);
    line.appendChild(info); line.appendChild(actions);
    container.appendChild(line);
  });
}

/* ====== send admin command ====== */
async function sendCommand(commandId, extra={}){
  const targetCode = document.getElementById("targetCode").value.trim();
  const payload = {
    serverId: SERVER_ID,
    command: commandId,
    target: targetCode || extra.targetUserId || null,
    extra,
    issuedBy: "web-admin"
  };
  try{
    const res = await fetch(`${BACKEND_BASE_URL}/command`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    const ok = await res.json();
    log(`Sent command: ${commandId} → ${JSON.stringify(payload)}`);
  }catch(e){
    log("Failed to send command: " + e.message);
  }
}

/* ====== broadcast ====== */
document.getElementById("broadcastBtn").onclick = ()=> {
  const msg = document.getElementById("broadcastMessage").value.trim();
  if(!msg) return log("Broadcast empty.");
  sendCommand("broadcast", {message: msg});
  document.getElementById("broadcastMessage").value = "";
}

/* ====== other UI hooks ====== */
document.getElementById("refreshPlayers").onclick = fetchPlayers;
document.getElementById("enterTarget").onclick = ()=>log("Target set: "+document.getElementById("targetCode").value);
document.getElementById("clearLogs").onclick = ()=>document.getElementById("serverLog").innerHTML = "";

/* ====== initial load ====== */
fetchPlayers();
setInterval(fetchPlayers, 15000); // auto-refresh players every 15s
</script>
</body>
</html>
