<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voltex | Get Key</title>
<style>
  body { 
    background:#0f0f0f; 
    color:#eee; 
    font-family: sans-serif; 
    display:flex; 
    justify-content:center; 
    align-items:center; 
    height:100vh; 
    margin:0;
  }
  .container { text-align:center; max-width:400px; }
  h1 { margin-bottom:1rem; }
  .btn { 
    background:#333; 
    color:#eee; 
    border:none; 
    padding:0.75rem 1.25rem; 
    border-radius:8px; 
    cursor:pointer; 
    font-size:1rem;
    transition:background 0.2s;
  }
  .btn:hover { background:#555; }
  #keyDisplay { 
    margin-top:1rem; 
    display:block; 
    padding:0.5rem; 
    background:#1a1a1a; 
    border-radius:6px;
    font-size:0.95rem;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Get Your Voltex Key</h1>
  <button class="btn" id="getKeyBtn">Generate Key</button>
  <div id="keyDisplay">No key yet</div>
</div>

<script>
const getKeyBtn = document.getElementById('getKeyBtn');
const keyDisplay = document.getElementById('keyDisplay');

getKeyBtn.addEventListener('click', async () => {
  keyDisplay.innerText = 'Fetching key...';
  try {
    const res = await fetch('https://yourdomain.net/api/getkey', { method: 'POST' });
    const data = await res.json();
    if (data.key) {
      keyDisplay.innerHTML = `
        <strong>Your Key:</strong> ${data.key}<br>
        <small>Copy and paste this into the executor</small>
      `;
    } else if (data.redirectUrl) {
      keyDisplay.innerHTML = `<a href="${data.redirectUrl}" target="_blank">Click here to continue</a>`;
    } else {
      keyDisplay.innerText = 'Failed to fetch key';
    }
  } catch {
    keyDisplay.innerText = 'Error connecting to server';
  }
});
</script>
</body>
</html>
