<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roblox Lua Obfuscator</title>
<style>
body { font-family: Arial; padding: 20px; background: #1e1e1e; color: #fff; }
textarea { width: 100%; height: 250px; background: #2d2d2d; color: #fff; border: none; padding: 10px; font-family: monospace; }
button { padding: 10px 20px; margin-top: 10px; background: #4caf50; border: none; cursor: pointer; color: #fff; }
button:hover { background: #45a049; }
</style>
</head>
<body>
<h2>Roblox Lua Obfuscator</h2>
<textarea id="input" placeholder="Paste your Lua script here"></textarea>
<button onclick="obfuscate()">Obfuscate</button>
<textarea id="output" placeholder="Obfuscated output"></textarea>

<script>
function randomVar(len=6){
    const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
    let str = '';
    for(let i=0;i<len;i++) str += chars[Math.floor(Math.random()*chars.length)];
    return '_'+str;
}

function obfuscate(){
    let code = document.getElementById('input').value;
    
    // remove comments
    code = code.replace(/--.*$/gm, '');
    
    // remove extra whitespace
    code = code.replace(/\n\s*\n/g,'\n').trim();
    
    // find all locals/globals
    let varNames = [...new Set(code.match(/\blocal\s+([a-zA-Z_][a-zA-Z0-9_]*)/g)?.map(x=>x.split(' ')[1]) || [])];
    
    // replace all variable names with random ones
    let mapping = {};
    for(let v of varNames){
        mapping[v] = randomVar(4 + Math.floor(Math.random()*4));
    }
    for(let orig in mapping){
        let re = new RegExp(`\\b${orig}\\b`, 'g');
        code = code.replace(re, mapping[orig]);
    }
    
    // optionally base64 encode strings
    code = code.replace(/(["'])(.*?)\1/g, (m,q,s)=>{
        return `decode64("${btoa(s)}")`;
    });
    
    // add decode64 function at the top if used
    if(code.includes('decode64')){
        code = `local decode64=function(s) return game:GetService("HttpService"):Base64Decode(s) end\n` + code;
    }
    
    document.getElementById('output').value = code;
}
</script>
</body>
</html>
