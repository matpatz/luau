<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interfaith Verse</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #fff;
      padding: 24px 32px;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      max-width: 700px;
      text-align: center;
    }
    select, button {
      margin: 10px;
      padding: 8px 12px;
      font-size: 1em;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .verse-text {
      font-size: 1.2em;
      line-height: 1.6;
      margin-top: 18px;
    }
    .verse-ref {
      font-weight: bold;
      margin-top: 10px;
    }
    .religion {
      margin-top: 8px;
      color: #6b7280;
      font-size: 0.9em;
    }
    .loading {
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Interfaith Verse Picker</h2>
    <div>
      <select id="religionPicker">
        <option value="christianity">Christianity (Bible)</option>
        <option value="islam">Islam (Quran)</option>
        <option value="judaism">Judaism (Tanakh)</option>
        <option value="hinduism">Hinduism (Bhagavad Gita)</option>
        <option value="buddhism">Buddhism (Suttas)</option>
      </select>
      <button id="fetchBtn">Get Verse</button>
    </div>

    <div id="loading" class="loading">Choose a religion and click "Get Verse".</div>
    <div id="verseText" class="verse-text"></div>
    <div id="verseRef" class="verse-ref"></div>
    <div id="religion" class="religion"></div>
  </div>

  <script>
    const picker = document.getElementById('religionPicker');
    const fetchBtn = document.getElementById('fetchBtn');

    const verseText = document.getElementById('verseText');
    const verseRef = document.getElementById('verseRef');
    const religion = document.getElementById('religion');
    const loading = document.getElementById('loading');

    // restore saved choice
    const saved = localStorage.getItem('religionChoice');
    if (saved) picker.value = saved;

    fetchBtn.addEventListener('click', () => {
      const choice = picker.value;
      localStorage.setItem('religionChoice', choice);

      verseText.textContent = '';
      verseRef.textContent = '';
      religion.textContent = '';
      loading.textContent = 'Loading...';

      if (choice === 'christianity') {
        fetch('https://bible-api.com/data/web/random')
          .then(res => res.json())
          .then(data => {
            const v = data.random_verse;
            verseText.textContent = v.text;
            verseRef.textContent = `${v.book} ${v.chapter}:${v.verse}`;
            religion.textContent = 'Christianity';
            loading.textContent = '';
          });
      }

      if (choice === 'islam') {
        fetch('https://api.alquran.cloud/v1/ayah/random')
          .then(res => res.json())
          .then(data => {
            const v = data.data;
            verseText.textContent = v.text;
            verseRef.textContent = `Surah ${v.surah.englishName} (${v.surah.number}):${v.numberInSurah}`;
            religion.textContent = 'Islam';
            loading.textContent = '';
          });
      }

      if (choice === 'judaism') {
        // Example: Genesis 1:1 (Sefaria doesn't provide a random endpoint, so we pick a sample)
        fetch('https://www.sefaria.org/api/texts/Genesis.1.1?lang=he-en')
          .then(res => res.json())
          .then(data => {
            verseText.textContent = data.text[0];
            verseRef.textContent = 'Genesis 1:1';
            religion.textContent = 'Judaism';
            loading.textContent = '';
          });
      }

      if (choice === 'hinduism') {
        fetch('https://bhagavadgitaapi.in/slok?random=true')
          .then(res => res.json())
          .then(data => {
            verseText.textContent = data.slok;
            verseRef.textContent = `Chapter ${data.chapter}, Verse ${data.verse}`;
            religion.textContent = 'Hinduism';
            loading.textContent = '';
          });
      }

      if (choice === 'buddhism') {
        // Sample stub: SuttaCentral doesn't provide simple random; we pick Dhammapada 1:1
        fetch('https://suttacentral.net/api/bilarasuttas/sn1.1.json')
          .then(res => res.json())
          .then(data => {
            verseText.textContent = data.translation.en[0] || 'Sample Buddhist text';
            verseRef.textContent = 'SN 1.1 (Sutta Nipāta)';
            religion.textContent = 'Buddhism';
            loading.textContent = '';
          });
      }
    });
  </script>
</body>
</html>
