<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>voltex — admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f0f10;--panel:#0b0b0c;--muted:#b9b9b9;--ink:#e8e8e8}
    body{margin:0;font-family:Inter,system-ui;background:linear-gradient(180deg,#0c0c0c,#050505);color:var(--ink);display:flex;align-items:center;justify-content:center;height:100vh;padding:24px}
    .card{width:100%;max-width:720px;background:var(--panel);padding:18px;border-radius:12px;border:1px solid rgba(255,255,255,0.03)}
    input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #222;background:#080808;color:var(--ink);margin-top:8px}
    .row{display:flex;gap:12px;margin-top:12px}
    button{padding:10px 14px;border-radius:10px;border:0;cursor:pointer;font-weight:700}
    .btn-primary{background:#3b82f6;color:white}
    .btn-ghost{background:transparent;border:1px solid #222;color:var(--ink)}
    .muted{color:var(--muted);font-size:13px}
    footer{margin-top:14px;color:var(--muted);font-size:13px;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <h2>Admin — Create Key</h2>
    <p class="muted">This form posts to <code>/api/admin/create-key</code>. Do NOT hardcode your admin secret here in production — use environment variables server-side.</p>

    <label>Admin Password</label>
    <input id="adminPass" type="password" placeholder="Enter admin password (sent to server)" />

    <label>Key Value</label>
    <input id="keyValue" type="text" placeholder="ex: ABCD-1234-XXXX" />

    <label>TTL (days)</label>
    <input id="ttlDays" type="number" min="1" value="30" />

    <div class="row">
      <button id="createBtn" class="btn-primary">Create Key</button>
      <button id="listBtn" class="btn-ghost">List Active Keys</button>
    </div>

    <div id="output" style="margin-top:12px"></div>

    <footer><a href="/" style="color:var(--muted);text-decoration:none">Back to Home</a></footer>
  </div>

  <script>
    function show(msg, bad=false) {
      const out = document.getElementById('output');
      out.innerHTML = `<div style="padding:10px;border-radius:8px;background:${bad ? '#3a0b0b':'#06220b'}">${msg}</div>`;
    }

    document.getElementById('createBtn').addEventListener('click', async () => {
      const adminPassword = document.getElementById('adminPass').value.trim();
      const keyValue = document.getElementById('keyValue').value.trim();
      const ttlDays = parseInt(document.getElementById('ttlDays').value, 10) || 30;
      if (!adminPassword || !keyValue) { show('Password and key value are required', true); return; }

      show('Creating…');
      try {
        const res = await fetch('/api/admin/create-key', {
          method: 'POST',
          headers: {'content-type':'application/json'},
          body: JSON.stringify({ adminPassword, value: keyValue, ttlDays })
        });
        const json = await res.json();
        if (!res.ok) { show('Error: ' + (json.message || res.statusText), true); return; }
        show('Key created — ID: ' + (json.id || '(no id returned)'));
      } catch (err) {
        show('Network error', true);
      }
    });

    document.getElementById('listBtn').addEventListener('click', async () => {
      show('Fetching active keys…');
      try {
        const res = await fetch('/api/keys'); // public/admin protected depends on server
        const json = await res.json();
        if (!res.ok) { show('Error: ' + (json.message || res.statusText), true); return; }
        show('<pre style="white-space:pre-wrap;color:var(--muted)">' + JSON.stringify(json, null, 2) + '</pre>');
      } catch (err) {
        show('Network error', true);
      }
    });
  </script>

  <!-- Analytics placeholder -->
  <!-- <script defer data-domain="yourdomain.com" src="https://plausible.io/js/script.js"></script> -->
</body>
</html>
